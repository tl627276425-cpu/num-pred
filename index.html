<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数字能量分析</title>
<style>
:root {
  --bg:#0f0f1a; --card:#1a1a2e; --gold:#d4a853; --gold2:#f0d68a;
  --text:#e0d6c2; --dim:#8a8578; --border:#2a2a3e; --radius:12px;
  --green:#5b8c5a; --red:#c0392b; --blue:#3a7ca5; --orange:#d4914a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.8;
background-image:radial-gradient(ellipse at 50% 0%,rgba(212,168,83,0.05) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(58,124,165,0.04) 0%,transparent 50%)}
.container{max-width:520px;margin:0 auto;padding:16px}
.header{text-align:center;padding:28px 0 16px}
.header .icon{width:60px;height:60px;margin:0 auto 10px;border-radius:50%;background:linear-gradient(135deg,#2a1f0a,#4a3510);display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid var(--gold)}
.header h1{font-size:20px;color:var(--gold2);font-weight:600;letter-spacing:2px}
.header p{font-size:12px;color:var(--dim);margin-top:2px}
.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.card h2{font-size:15px;color:var(--gold2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h2::before{content:'';width:3px;height:15px;background:var(--gold);border-radius:2px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:var(--dim);margin-bottom:5px;letter-spacing:1px}
.fg input,.fg select{width:100%;padding:11px 12px;background:#12121f;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;outline:none;font-family:inherit;transition:border-color .3s}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
.fg input::placeholder{color:#4a4558}
.pi{display:flex;gap:8px;align-items:center}
.pi span{color:var(--dim);font-size:13px;white-space:nowrap}
.pi input{flex:1;padding:11px;background:#12121f;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:20px;text-align:center;letter-spacing:6px;outline:none;font-family:inherit;max-width:150px}
.pi input:focus{border-color:var(--gold)}
.hint{font-size:10px;color:var(--dim);margin-top:3px}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#8b6914,#b8941f);color:#1a1a0a;border:none;border-radius:8px;font-size:16px;font-weight:600;letter-spacing:2px;cursor:pointer;font-family:inherit;transition:all .3s}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:scale(.98)}
.err{background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#e0554a;margin-bottom:10px;display:none}
.results{display:none}
.rcard{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;border:1px solid var(--border)}
.rcard h3{font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.rcard h3 .l{display:flex;align-items:center;gap:6px}
.score{font-size:13px;font-weight:700;padding:2px 10px;border-radius:12px;letter-spacing:1px}
.s-high{background:rgba(91,140,90,0.2);color:#6bae6a}
.s-mid{background:rgba(212,145,74,0.2);color:#d4914a}
.s-low{background:rgba(192,57,43,0.2);color:#e0554a}
.free-txt{font-size:13px;line-height:1.9;color:var(--text)}
.free-txt .a{display:block;margin-bottom:4px}
.free-txt .b{display:block;color:#c5bfb0;font-size:12px;font-style:italic}
.level-tag{display:inline-block;padding:1px 8px;border-radius:4px;font-size:10px;margin-right:4px}
.l-good{background:rgba(91,140,90,0.15);color:#6bae6a}
.l-caution{background:rgba(192,57,43,0.15);color:#e0554a}
.l-neutral{background:rgba(138,133,120,0.15);color:#a5a08a}

.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.ov-item{background:#12121f;border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)}
.ov-item .lbl{font-size:10px;color:var(--dim)}
.ov-item .val{font-size:24px;font-weight:700;color:var(--gold2);letter-spacing:2px}
.ov-item .sub{font-size:11px;color:var(--dim);margin-top:1px}
.bar-wrap{height:6px;background:#1a1a2e;border-radius:3px;margin:6px 0;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.b-gold{background:linear-gradient(90deg,#8b6914,var(--gold))}
.b-blue{background:linear-gradient(90deg,#1a5276,var(--blue))}
.b-green{background:linear-gradient(90deg,#2d5a2d,var(--green))}

.summary-tags{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.summary-tags span{padding:4px 10px;border-radius:12px;font-size:11px}
.t-dom{background:rgba(212,168,83,0.15);color:var(--gold2)}
.t-warn{background:rgba(192,57,43,0.12);color:#e0554a}

/* Paywall */
.pw{background:linear-gradient(135deg,#1a1a0f,#1f1a0a);border:2px dashed var(--gold);border-radius:var(--radius);padding:22px 18px;text-align:center;margin:18px 0;position:relative}
.pw::before{content:'🔒';position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:28px;background:var(--bg);padding:0 8px}
.pw h3{color:var(--gold2);font-size:16px;margin:8px 0 4px}
.pw .price{font-size:26px;color:var(--gold);font-weight:700;margin:6px 0}
.pw .price small{font-size:13px}
.qr-box{width:160px;height:160px;margin:12px auto;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#999;font-size:12px;flex-direction:column;gap:6px;cursor:pointer;overflow:hidden}
.qr-box img{width:100%;height:100%;object-fit:contain}
.unlock-row{display:flex;gap:8px;margin-top:10px}
.unlock-row input{flex:1;padding:9px 10px;background:#12121f;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;text-align:center;outline:none;font-family:inherit}
.unlock-row input:focus{border-color:var(--gold)}
.unlock-row button{padding:9px 18px;background:var(--gold);border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.locked{filter:blur(5px);pointer-events:none;user-select:none;opacity:0.35}
.unlocked{filter:none;pointer-events:auto;user-select:auto;opacity:1}
.detail-txt{font-size:12px;line-height:2;color:#c5bfb0;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.detail-txt strong{color:var(--gold2)}
.detail-txt .hl{color:var(--gold);font-weight:600}
.footer{text-align:center;padding:18px;font-size:10px;color:var(--dim)}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.rcard{animation:up .5s ease forwards}
.rcard:nth-child(2){animation-delay:.05s}
.rcard:nth-child(3){animation-delay:.1s}
.rcard:nth-child(4){animation-delay:.15s}
.rcard:nth-child(5){animation-delay:.2s}
.rcard:nth-child(6){animation-delay:.25s}
.rcard:nth-child(7){animation-delay:.3s}
.rcard:nth-child(8){animation-delay:.35s}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="icon">☯</div>
  <h1>数字能量分析</h1>
  <p>手机号后四位 · 多维深度解读</p>
</div>

<div class="card" id="inputForm">
  <h2>📱 输入信息</h2>
  <div class="fg">
    <label>手机号后四位</label>
    <div class="pi"><span>*******</span><input type="text" id="phoneDigits" placeholder="0000" maxlength="4" inputmode="numeric"></div>
    <div class="hint">输入手机号码最后4位数字</div>
  </div>
  <div class="fg"><label>使用该号码多长时间</label>
    <select id="duration"><option value="">请选择</option><option value="0.5">半年以内</option><option value="1">1年</option><option value="2">2年</option><option value="3">3-5年</option><option value="5">5-10年</option><option value="10">10年以上</option></select>
    <div class="hint">使用越久，磁场影响越大</div>
  </div>
  <div class="fg"><label>性别</label><select id="gender"><option value="">请选择</option><option value="male">男</option><option value="female">女</option></select></div>
  <div class="fg"><label>年龄</label><input type="number" id="age" placeholder="请输入年龄" min="10" max="100"><div class="hint">用于确定当前大运阶段</div></div>
  <div class="err" id="errorMsg"></div>
  <button class="btn" id="analyzeBtn">⚡ 开始分析</button>
  <div id="jsStatus" style="text-align:center;font-size:10px;color:#5b8c5a;margin-top:6px;display:none">✅ 系统就绪</div>
</div>

<div class="results" id="resultsSection"></div>
<div class="footer"><p>基于传统数理分析 · 仅供娱乐参考</p><p>不构成任何决策建议</p></div>
</div>

<script>
// ============================================================
// 第一层：数据映射
// ============================================================
var E2N = {'1':'金','2':'金','3':'火','4':'木','5':'木','6':'水','7':'土','8':'土','9':'金','0':'土'};
var N2G = {'1':'乾','2':'兑','3':'离','4':'震','5':'巽','6':'坎','7':'艮','8':'坤','9':'乾','0':'坤'};
var G2E = {乾:'金',兑:'金',离:'火',震:'木',巽:'木',坎:'水',艮:'土',坤:'土'};
var G2BODY = {乾:'头部、骨骼、心血管',兑:'呼吸道、牙齿、小骨骼',离:'心脏、眼睛',震:'肝胆、四肢',巽:'神经系统、四肢骨骼',坎:'肾、血液、膀胱、内分泌',艮:'腰背、坐骨神经',坤:'脾胃、腹部'};
var G2CHAR = {
  乾:{pos:'强势、主导、讲秩序、执行力强',neg:'控制欲强、过于自我、容易独断',style:'雷厉风行，不喜欢拖泥带水'},
  兑:{pos:'能说会道、人缘好、表达强',neg:'嘴快伤人、口舌是非多、容易话多误事',style:'善于沟通，靠嘴吃饭的类型'},
  离:{pos:'外放、热情、反应快、表现力强',neg:'急躁、情绪波动大、容易上头',style:'想到就做，热情来得快去得也快'},
  震:{pos:'行动快、有魄力、果断',neg:'脾气急、容易冲动、反应过猛',style:'遇到事情第一反应是干，不是等'},
  巽:{pos:'灵活、善变通、适应力强、擅长策划',neg:'摇摆不定、优柔寡断、容易中途改主意',style:'脑子转得快，计划赶不上变化'},
  坎:{pos:'聪明、谋略深、会算、格局大',neg:'顾虑多、算计重、容易把自己绕进去',style:'想得比别人多，但有时候想太多反而动不了'},
  艮:{pos:'稳重、踏实、能守成、有耐心',neg:'固执、慢热、不够灵活、容易僵化',style:'不轻易动，但一旦动了就不会回头'},
  坤:{pos:'包容、能扛事、耐力强、善解人意',neg:'被动、拖延、容易压抑、不够主动',style:'能撑能扛，但有时候扛太多了忘了自己也需要休息'}
};

// 大运
var DAYUN_MAP = [[10,20,'乾','金'],[20,30,'兑','金'],[30,40,'离','火'],[40,50,'震','木'],[50,60,'巽','木'],[60,70,'坎','水'],[70,80,'艮','土'],[80,99,'坤','土']];
function getDayun(age) {
  for(var i=0;i<DAYUN_MAP.length;i++) {
    if(age>=DAYUN_MAP[i][0]&&age<DAYUN_MAP[i][1]) return {name:DAYUN_MAP[i][2],element:DAYUN_MAP[i][3],range:[DAYUN_MAP[i][0],DAYUN_MAP[i][1]]};
  }
  return age<10?{name:'乾',element:'金',range:[10,20]}:{name:'坤',element:'土',range:[80,90]};
}

// 五行生克
var SHENG = {木:'火',火:'土',土:'金',金:'水',水:'木'};
var KE = {金:'木',木:'土',土:'水',水:'火',火:'金'};
function isSheng(a,b){return SHENG[a]===b}
function isKe(a,b){return KE[a]===b}

// 地支映射 (用于桃花/财库)
var DZ_MAP = {0:'亥',1:'子',2:'丑',3:'寅',4:'卯',5:'辰',6:'巳',7:'午',8:'未',9:'申'};
var TAOHUA_SET = {子:1,卯:1,午:1,酉:1};
var CAIKU_SET = {丑:1,辰:1,未:1,戌:1};

// ============================================================
// 第二层：计算层
// ============================================================
function compute(digits, age, gender, duration) {
  var d = digits.split('');

  // 五行统计
  var elemCount = {金:0,木:0,水:0,火:0,土:0};
  var trigramCount = {};
  for(var i=0;i<4;i++) {
    var el = E2N[d[i]];
    var g = N2G[d[i]];
    elemCount[el] = (elemCount[el]||0) + 1;
    trigramCount[g] = (trigramCount[g]||0) + 1;
  }

  // 主导元素和卦
  var domElem = '', domCount = 0;
  for(var e in elemCount) { if(elemCount[e] > domCount) { domElem = e; domCount = elemCount[e]; } }
  var domTrigrams = [];
  for(var g in trigramCount) { if(trigramCount[g] >= 2) domTrigrams.push(g); }

  // 平衡分 (元素分布越均匀越高)
  var balScore = 100;
  for(var e in elemCount) { if(elemCount[e] >= 3) balScore -= 25; else if(elemCount[e]===0) balScore -= 10; }
  if(domCount>=4) balScore = 30; // 全同元素

  // 特殊标记
  var isBaozi = (d[0]===d[1]&&d[1]===d[2]&&d[2]===d[3]);
  var hasAccident = false;
  for(var i=0;i<3;i++) {
    var e1=E2N[d[i]], e2=E2N[d[i+1]];
    if((e1==='火'&&e2==='金')||(e1==='金'&&e2==='木')) hasAccident = true;
  }

  // 四宫 (父母/夫妻/自身/子女)
  var palaces = [
    {name:'父母宫',digit:d[0],element:E2N[d[0]],trigram:N2G[d[0]],dz:DZ_MAP[d[0]]},
    {name:'夫妻宫',digit:d[1],element:E2N[d[1]],trigram:N2G[d[1]],dz:DZ_MAP[d[1]]},
    {name:'自身宫',digit:d[2],element:E2N[d[2]],trigram:N2G[d[2]],dz:DZ_MAP[d[2]]},
    {name:'子女宫',digit:d[3],element:E2N[d[3]],trigram:N2G[d[3]],dz:DZ_MAP[d[3]]}
  ];
  var self = palaces[2];

  // 夫妻宫关系
  var spRel = '';
  var spEl = palaces[1].element, selfEl = self.element;
  if(isKe(spEl, selfEl)) spRel = '克自身';
  else if(isKe(selfEl, spEl)) spRel = '自身克';
  else if(isSheng(spEl, selfEl)) spRel = '生自身';
  else if(isSheng(selfEl, spEl)) spRel = '自身生';
  else spRel = '比合';

  // 大运
  var dayun = getDayun(age);
  var dyRel = '';
  if(isSheng(dayun.element, selfEl)) dyRel = '生自身';
  else if(isKe(dayun.element, selfEl)) dyRel = '克自身';
  else if(isSheng(selfEl, dayun.element)) dyRel = '自身生';
  else if(isKe(selfEl, dayun.element)) dyRel = '自身克';
  else dyRel = '比合';

  // 桃花/财库
  var hasTaohua = false, hasCaiku = false;
  for(var i=0;i<4;i++) { if(TAOHUA_SET[DZ_MAP[d[i]]]) hasTaohua = true; if(CAIKU_SET[DZ_MAP[d[i]]]) hasCaiku = true; }

  // 连号检测
  var hasSeq = false;
  for(var i=0;i<2;i++) { if(Math.abs(parseInt(d[i+1])-parseInt(d[i]))===1) hasSeq = true; }

  // 重复分
  var repeatScore = 0;
  var seen={};
  for(var i=0;i<4;i++) { if(seen[d[i]]) repeatScore+=25; seen[d[i]]=1; }

  return {
    digits:d, elemCount:elemCount, trigramCount:trigramCount,
    domElem:domElem, domTrigrams:domTrigrams, balScore:balScore,
    isBaozi:isBaozi, hasAccident:hasAccident, hasTaohua:hasTaohua, hasCaiku:hasCaiku,
    hasSeq:hasSeq, repeatScore:repeatScore,
    palaces:palaces, self:self, spRel:spRel, dayun:dayun, dyRel:dyRel,
    age:age, gender:gender, duration:duration
  };
}

// ============================================================
// 第三层：评分
// ============================================================
function scoreDimension(comp, dim) {
  var s = 50;
  var el = comp.elemCount, tg = comp.trigramCount, self = comp.self;

  if(dim === 'career') {
    if(tg['乾']>=2 || tg['震']>=2) s += 15; // 乾震强：事业主导
    if(tg['坤']>=2 || tg['艮']>=2) s -= 5;
    if(comp.dyRel === '比合' || comp.dyRel === '生自身') s += 12;
    if(comp.dyRel === '克自身') s -= 15;
    if(comp.dyRel === '自身克') s += 10;
    if(comp.isBaozi) s += (self.element==='金'||self.element==='火'?8:-5);
    if(tg['离']>=2) s += 5;
    if(comp.hasSeq) s += 3;
  }

  if(dim === 'love') {
    if(tg['兑']>=2 || tg['离']>=2) s += 15;
    if(tg['巽']>=1) s += 5;
    if(comp.hasTaohua) s += 10;
    if(comp.spRel === '克自身') s -= 12;
    if(comp.spRel === '生自身') s += 10;
    if(comp.spRel === '自身生') s -= 5;
    if(tg['坎']>=2) s -= 5; // 坎多：情绪深、试探多
    if(el['火']>=3) s -= 5; // 太热容易散
  }

  if(dim === 'marriage') {
    if(tg['坤']>=1 || tg['艮']>=1) s += 12;
    if(el['土']>=1 && el['土']<=2) s += 8;
    if(comp.spRel === '比合') s += 10;
    if(comp.spRel === '克自身') s -= 10;
    if(tg['兑']>=3 || tg['离']>=3) s -= 10;
    if(tg['乾']>=3 || tg['震']>=3) s -= 5;
    if(comp.isBaozi && self.element==='火') s -= 8;
    if(comp.isBaozi && self.element==='土') s += 5;
  }

  if(dim === 'health') {
    s = 70;
    for(var e in el) { if(el[e]>=3) s -= 20; }
    if(comp.hasAccident) s -= 20;
    if(comp.balScore >= 70) s += 10;
    if(el['水']>=3) s -= 8;
    if(el['火']>=3) s -= 8;
    if(comp.dyRel === '克自身' || comp.dyRel === '自身生') s -= 5;
  }

  if(dim === 'personality') {
    s = 60;
    if(comp.balScore >= 70) s += 10;
    if(comp.isBaozi) s -= 15;
    if(el[self.element]>=3) s -= 10;
    if(comp.repeatScore > 0) s -= 5;
    if(tg['乾']>=2) s += 5;
    if(tg['兑']>=2) s += 3;
  }

  if(dim === 'wealth') {
    if(comp.hasCaiku) s += 15;
    if(comp.dyRel === '自身克') s += 15;
    if(comp.dyRel === '克自身') s -= 10;
    if(tg['乾']>=2) s += 5;
    if(el['水']>=3) s -= 5;
    if(comp.hasSeq) s += 5;
  }

  if(dim === 'family') {
    if(el['土']>=1 && el['土']<=2) s += 10;
    if(tg['坤']>=1) s += 8;
    if(comp.spRel === '比合') s += 8;
    if(comp.spRel === '克自身') s -= 10;
    if(comp.dyRel === '克自身') s -= 5;
    if(el['火']>=3) s -= 5;
  }

  s = Math.max(5, Math.min(98, s));
  var level = s>=75?'excellent':s>=60?'good':s>=45?'neutral':s>=30?'caution':'warning';
  return {score:s, level:level};
}

// ============================================================
// 第四层：模板输出
// ============================================================
function rand(arr, seed) {
  // 用号码hash做伪随机，保证同一号码总选相同的模板
  var idx = seed % arr.length;
  return arr[idx];
}

// 模板库
var TPL = {
  career: {

function pickTpl(dim, level, seed) {
  var pool = TPL[dim][level] || TPL[dim]['neutral'];
  return {
    a: rand(pool.a, seed),
    b: rand(pool.b, seed + 1)
  };
}

function generateReport(comp) {
  var seedBase = parseInt(comp.digits.join(''),10);

  var dims = ['personality','career','wealth','love','marriage','health','family'];
  var labels = {personality:'性格特质',career:'事业运势',wealth:'财运分析',love:'感情运势',marriage:'婚姻分析',health:'健康提示',family:'家庭关系'};
  var emojis = {personality:'🧠',career:'💼',wealth:'💰',love:'💕',marriage:'💍',health:'🏥',family:'👨‍👩‍👧'};

  var report = {};
  for(var i=0;i<dims.length;i++) {
    var d = dims[i];
    var sc = scoreDimension(comp, d);
    var tpl = pickTpl(d, sc.level, seedBase + i*100);
    report[d] = {score:sc.score, level:sc.level, style_a:tpl.a, style_b:tpl.b, label:labels[d], emoji:emojis[d]};
  }

  // 总结
  var totalScore = 0, count = 0;
  for(var i=0;i<dims.length;i++) { totalScore += report[dims[i]].score; count++; }
  var avgScore = Math.round(totalScore/count);
  var overall = avgScore >= 65 ? '偏吉' : avgScore >= 45 ? '平' : '偏凶';

  var domElements = [comp.domElem];
  for(var e in comp.elemCount) { if(comp.elemCount[e]>=2 && e!==comp.domElem) domElements.push(e); }

  var summary = {
    overall: overall,
    avgScore: avgScore,
    domElements: domElements,
    domTrigrams: comp.domTrigrams,
    warnings: []
  };

  if(comp.hasAccident) summary.warnings.push('号码含冲撞组合，注意出行安全');
  if(comp.isBaozi) summary.warnings.push('豹子号磁场极强，个性极端');
  if(comp.dyRel === '克自身') summary.warnings.push('当前大运对你不利，宜稳守');
  if(!comp.hasCaiku) summary.warnings.push('财库不显，注意理财规划');

  return {report:report, summary:summary, comp:comp};
}

var isUnlocked = false;

function levelClass(l) {
  if(l==='excellent'||l==='good') return 's-high';
  if(l==='neutral') return 's-mid';
  return 's-low';
}
function levelName(l) {
  var m = {excellent:'优',good:'良',neutral:'平',caution:'注意',warning:'⚠'};
  return m[l]||'平';
}

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() { document.getElementById('errorMsg').style.display='none'; }

function startAnalysis() {
  try {
    hideError();
    var digitsStr = document.getElementById('phoneDigits').value.trim();
    var duration = document.getElementById('duration').value;
    var gender = document.getElementById('gender').value;
    var ageStr = document.getElementById('age').value;
    var age = parseInt(ageStr);

    if(!/^\d{4}$/.test(digitsStr)) { showError('请输入4位数字的手机号后四位'); return; }
    if(!duration) { showError('请选择使用时长'); return; }
    if(!gender) { showError('请选择性别'); return; }
    if(!ageStr||isNaN(age)||age<10||age>100) { showError('请输入有效年龄（10-100岁）'); return; }

    try { isUnlocked = localStorage.getItem('np_unlocked')==='true'; } catch(e){ isUnlocked = false; }

    var comp = compute(digitsStr, age, gender, parseFloat(duration));
    var gen = generateReport(comp);
    currentData = gen;

    renderResults(gen);
    document.getElementById('resultsSection').style.display = 'block';
    document.getElementById('resultsSection').scrollIntoView({behavior:'smooth'});
  } catch(e) {
    showError('分析出错: ' + e.message);
    console.error(e);
  }
}

function makeDetail(dim, item, comp) {
  var lines = [];
  lines.push('<strong>评分：</strong>'+item.score+'分（'+levelName(item.level)+'）——此评分基于号码五行分布、卦象强弱、大运匹配度综合计算。');
  lines.push('<strong>判断一：</strong>'+item.style_a);
  lines.push('<strong>判断二：</strong>'+item.style_b);

  // 维度特定深度分析
  if(dim==='career') {
    lines.push('<strong>细节：</strong>当前处于<span class="hl">'+comp.dayun.name+'卦大运</span>（'+comp.dayun.range[0]+'-'+comp.dayun.range[1]+'岁），大运'+comp.dyRel+'。');
    if(comp.dyRel==='克自身') lines.push('若是体制内/大公司，反而利官运晋升；若自由职业或创业，则需多防意外阻力。');
    if(comp.dyRel==='自身克') lines.push('这阶段适合冲业绩、冲收入，但节奏太快容易出错，建议大事多确认、小事快执行。');
    if(comp.trigramCount['乾']>=2) lines.push('乾卦强旺，天生带管理气场，适合往管理层或独立带项目方向发展。');
    if(comp.trigramCount['离']>=2) lines.push('离卦凸显，适合曝光型、表现型工作——台前比幕后更适合你。');
  }

  if(dim==='love') {
    lines.push('<strong>细节：</strong>'+(comp.hasTaohua?'桃花活跃，身边不乏异性缘，但桃花多不代表质量高——学会筛选比学会吸引更重要。':'桃花不算旺，但胜在稳定——来的不会是烂桃花。'));
    if(comp.spRel==='克自身') lines.push('关系中容易感觉被压制。建议你主动设立沟通边界——什么事能忍，什么事不能忍，提前想清楚。');
    else if(comp.spRel==='自身克') lines.push('你在关系中占主导。好处是你说了算，风险是对方可能积累不满。偶尔示弱会让关系更舒服。');
    else if(comp.spRel==='生自身') lines.push('对方对你有滋养作用——在你低谷时能撑你一把。记住感恩，别把好当成理所当然。');
  }

  if(dim==='marriage') {
    lines.push('<strong>细节：</strong>'+(comp.spRel==='比合'?'两人势均力敌，商量着来是最舒服的模式。但平等不等于各过各的——保持共同目标很重要。':'婚姻需要'+(comp.spRel==='克自身'?'双方都学会让步。一方长期忍让总会爆发，建立"吵架规则"比如不隔夜、不翻旧账。':'用心经营。'+(comp.gender==='male'?'作为丈夫，多问一句"你觉得呢"能让对方感觉被尊重。':'作为妻子，别什么事都自己扛——让对方进入你的责任区反而让关系更紧密。'))));
  }

  if(dim==='health') {
    lines.push('<strong>细节：</strong>重点关注的系统：'+G2BODY[comp.self.trigram]+'。');
    lines.push('各宫对应：'+comp.palaces.map(function(p){return p.name+'（'+G2BODY[p.trigram]+')';}).join('；')+'。');
    if(comp.hasAccident) lines.push('<span class="hl">⚠ 安全提示：</span>号码含冲撞组合（火克金或金克木），在出行、驾车、运动时多一份小心，不宜高危活动。');
    if(comp.elemCount['火']>=3) lines.push('火元素过旺，容易上火、急躁、失眠——建议降温和规律作息。');
  }

  if(dim==='personality') {
    var tg = comp.self.trigram;
    var ch = G2CHAR[tg];
    lines.push('<strong>细节：</strong>你的核心风格——'+ch.style+'。');
    lines.push('优势面：'+ch.pos+'。');
    lines.push('需留意：'+ch.neg+'。');
    if(comp.isBaozi) lines.push('豹子号让这些特质加倍放大——是优势也是风险，关键在于有没有人帮你踩刹车。');
  }

  if(dim==='wealth') {
    lines.push('<strong>细节：</strong>'+(comp.hasCaiku?'号码带财库，代表你有存钱的底子——钱到你手里不容易流走。':'财库不显，容易钱到手就花。建议强制储蓄：工资到账先转一笔到另一个账户。'));
    lines.push('大运财运：'+(comp.dyRel==='自身克'?'当前大运利求财，适合做生意、投资、拓展收入渠道。':'当前大运求财不宜冒进，稳住现有收入就是赢。'));
  }

  if(dim==='family') {
    lines.push('<strong>细节：</strong>'+(comp.elemCount['土']>=2?'土元素稳重，家庭根基比较扎实——长辈是你的后盾，但也要注意别把家里的支持当成理所当然。':'家庭关系需要主动维护——定期联系、回家吃饭、节日问候，小事积累起来就是大事。'));
    lines.push('孩子方面：'+(comp.trigramCount['巽']>=1?'孩子可能比较灵活、有创意，需要你给空间而不是给框架。':'孩子的事顺其自然就好，过度操心反而双方都累。'));
  }

  return lines.join('<br>');
}

function makeSummaryDetail(s, comp) {
  var lines = [];
  lines.push('<strong>整体评估：</strong>'+s.overall+'（综合得分'+s.avgScore+'分）。');
  lines.push('<strong>能量特征：</strong>号码主导元素为<span class="hl">'+s.domElements.join('、')+'</span>，主导卦象为<span class="hl">'+(s.domTrigrams.length>0?s.domTrigrams.join('、'):'分散无主导')+'</span>。');
  lines.push('<strong>当前大运：</strong>'+comp.dayun.name+'卦大运（'+comp.dayun.range[0]+'-'+comp.dayun.range[1]+'岁），'+comp.dyRel+'。');

  if(s.warnings.length > 0) {
    lines.push('<strong>⚠ 风险提示：</strong>'+s.warnings.join('；')+'。');
  } else {
    lines.push('<strong>提示：</strong>号码整体组合尚可，没有明显硬伤。建议关注大运转折点（每10年），运势切换时提前做好准备。');
  }

  lines.push('<strong>建议：</strong>'+(s.avgScore>=65?'当前阶段适合主动出击，抓住机会往上走。':'当前阶段适合稳扎稳打，把基础做扎实。')+' 号码不是命运本身，而是一种能量倾向——了解它，善用它，但不能依赖它。');

  return lines.join('<br>');
}

// ============================================================
// 事件绑定
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  var jsStatus = document.getElementById('jsStatus');
  if(jsStatus) jsStatus.style.display = 'block';

  try { isUnlocked = localStorage.getItem('np_unlocked')==='true'; } catch(e){}

  var btn = document.getElementById('analyzeBtn');
  if(btn) btn.addEventListener('click', startAnalysis);

  var phoneInput = document.getElementById('phoneDigits');
  if(phoneInput) {
    phoneInput.addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g,'').slice(0,4);
    });
  }

  // 动态元素事件代理
  var rs = document.getElementById('resultsSection');
  rs.addEventListener('click', function(e) {
    if(e.target.closest('#qrBox')) {
      var upload = document.getElementById('qrUpload');
      if(upload) upload.click();
    }
    if(e.target.closest('#unlockBtn')) {
      unlockReport();
    }
  });
  rs.addEventListener('change', function(e) {
    if(e.target.id === 'qrUpload') {
      handleQRUpload(e);
    }
  });
});

function handleQRUpload(event) {
  var file = event.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('qrImg');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('qrText').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function unlockReport() {
  var code = document.getElementById('unlockCode').value.trim();
  var validCodes = ['8888','2026','6688'];
  if(validCodes.indexOf(code) >= 0) {
    isUnlocked = true;
    try { localStorage.setItem('np_unlocked','true'); } catch(e){}
    var pw = document.getElementById('paywall');
    if(pw) pw.style.display = 'none';
    var ds = document.getElementById('detailSection');
    if(ds) { ds.classList.remove('locked'); ds.classList.add('unlocked'); }
  } else {
    alert('解锁码错误，请确认后重试。\n演示码：8888');
  }
}

window.onerror = function(msg, url, line) {
  var el = document.getElementById('errorMsg');
  el.innerHTML = '⚠ 系统错误: ' + msg + '<br>行: ' + line;
  el.style.display = 'block';
  el.style.background = 'rgba(192,57,43,0.8)';
  el.style.color = '#fff';
  el.style.padding = '12px';
  el.style.borderRadius = '8px';
  return false;
};
