<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数字人格分析</title>
<style>
:root{--bg:#0a0a14;--card:#121222;--gold:#c9a040;--gold2:#e8d080;--text:#d8d0c0;--dim:#888478;--border:#222240;--r:12px;--green:#5a9a5a;--red:#c04040;--blue:#4080b0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.8;
background-image:radial-gradient(ellipse at 30% 0%,rgba(201,160,64,0.05) 0%,transparent 50%),radial-gradient(ellipse at 70% 100%,rgba(64,128,176,0.04) 0%,transparent 50%)}
.ct{max-width:520px;margin:0 auto;padding:16px}
.hd{text-align:center;padding:24px 0 14px}
.hd .ic{width:56px;height:56px;margin:0 auto 8px;border-radius:50%;background:linear-gradient(135deg,#2a1a08,#4a3008);display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid var(--gold)}
.hd h1{font-size:19px;color:var(--gold2);font-weight:600;letter-spacing:2px}
.hd p{font-size:11px;color:var(--dim)}
.cd{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.cd h2{font-size:14px;color:var(--gold2);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.cd h2::before{content:'';width:2px;height:14px;background:var(--gold);border-radius:1px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
.fg input,.fg select{width:100%;padding:10px 11px;background:#0c0c1a;border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
.pi{display:flex;gap:6px;align-items:center}
.pi span{color:var(--dim);font-size:12px}
.pi input{flex:1;padding:10px;background:#0c0c1a;border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:19px;text-align:center;letter-spacing:5px;outline:none;max-width:140px;font-family:inherit}
.pi input:focus{border-color:var(--gold)}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#7a5a10,#b08020);color:#1a1a0a;border:none;border-radius:7px;font-size:15px;font-weight:600;letter-spacing:2px;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(.97)}
.err{background:rgba(192,64,64,0.15);border:1px solid rgba(192,64,64,0.3);border-radius:7px;padding:9px 12px;font-size:11px;color:#e06060;margin-bottom:8px;display:none}
.results{display:none}
.rc{background:var(--card);border-radius:var(--r);padding:15px;margin-bottom:8px;border:1px solid var(--border)}
.rc h3{font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:6px;justify-content:space-between}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px}
.tg{background:rgba(201,160,64,0.15);color:var(--gold2)}
.tw{background:rgba(192,64,64,0.12);color:#e06060}
.tb{background:rgba(64,128,176,0.15);color:#80b8e0}
.pname{font-size:22px;font-weight:700;color:var(--gold2);text-align:center;margin:6px 0 2px;letter-spacing:1px}
.psub{font-size:11px;color:var(--dim);text-align:center;margin-bottom:10px}
.pks{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0}
.pks span{padding:5px 14px;border-radius:16px;font-size:12px;background:rgba(201,160,64,0.12);color:var(--gold2);border:1px solid rgba(201,160,64,0.2)}
.radar-wrap{width:200px;height:200px;margin:10px auto}
.radar-wrap canvas{width:100%;height:100%}
.free-line{font-size:12px;color:var(--dim);line-height:2;margin-top:6px}
.free-line li{margin:3px 0 3px 14px}
.pw{background:linear-gradient(135deg,#141408,#1a1808);border:2px dashed var(--gold);border-radius:var(--r);padding:20px 16px;text-align:center;margin:14px 0;position:relative}
.pw::before{content:'🔒';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:24px;background:var(--bg);padding:0 8px}
.pw h3{color:var(--gold2);font-size:15px;margin:6px 0}
.pw .price{font-size:24px;color:var(--gold);font-weight:700;margin:5px 0}
.qr-box{width:140px;height:140px;margin:10px auto;background:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#999;font-size:11px;flex-direction:column;gap:4px;cursor:pointer;overflow:hidden}
.qr-box img{width:100%;height:100%;object-fit:contain}
.ur{display:flex;gap:6px;margin-top:8px}
.ur input{flex:1;padding:8px;background:#0c0c1a;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;text-align:center;outline:none;font-family:inherit}
.ur button{padding:8px 16px;background:var(--gold);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.locked{filter:blur(6px);pointer-events:none;user-select:none;opacity:0.3}
.unlocked{filter:none;pointer-events:auto;user-select:auto;opacity:1}
.dt{font-size:11px;line-height:2.2;color:#c0b8a8;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.dt strong{color:var(--gold2);display:block;margin-top:12px;margin-bottom:4px;font-size:12px}
.dt em{color:#c0a060;font-style:normal}
.dt p{margin:4px 0}
.ft{text-align:center;padding:16px;font-size:9px;color:var(--dim)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.rc{animation:up .5s ease forwards}
</style>
</head>
<body>
<div class="ct">
<div class="hd"><div class="ic">☯</div><h1>数字人格分析</h1><p>手机号后四位 · 先画像·再解读</p></div>

<div class="cd" id="inputForm"><h2>📱 输入信息</h2>
<div class="fg"><label>手机号后四位</label><div class="pi"><span>*******</span><input type="text" id="phoneDigits" placeholder="0000" maxlength="4" inputmode="numeric"></div></div>
<div class="fg"><label>使用时长</label><select id="duration"><option value="">请选择</option><option value="0.5">半年以内</option><option value="1">1年</option><option value="2">2年</option><option value="3">3-5年</option><option value="5">5-10年</option><option value="10">10年以上</option></select></div>
<div class="fg"><label>性别</label><select id="gender"><option value="">请选择</option><option value="male">男</option><option value="female">女</option></select></div>
<div class="fg"><label>年龄</label><input type="number" id="age" placeholder="请输入年龄" min="10" max="100"></div>
<div class="err" id="errorMsg"></div>
<button class="btn" id="analyzeBtn">⚡ 开始分析</button>
<div id="jsStatus" style="text-align:center;font-size:9px;color:#5a9a5a;margin-top:4px;display:none">✅ 系统就绪</div>
</div>

<div class="results" id="resultsSection"></div>
<div class="ft"><p>基于数字能量结构分析 · 仅供娱乐参考</p></div>
</div>

<script>
// ====== 一、数据层 ======
var E2N={'1':'金','2':'金','3':'火','4':'木','5':'木','6':'水','7':'土','8':'土','9':'金','0':'土'};
var N2G={'1':'乾','2':'兑','3':'离','4':'震','5':'巽','6':'坎','7':'艮','8':'坤','9':'乾','0':'坤'};
var G2E={乾:'金',兑:'金',离:'火',震:'木',巽:'木',坎:'水',艮:'土',坤:'土'};
var SHENG={木:'火',火:'土',土:'金',金:'水',水:'木'};
var KE={金:'木',木:'土',土:'水',水:'火',火:'金'};
function se(a,b){return SHENG[a]===b}
function ke(a,b){return KE[a]===b}
var DZ={0:'亥',1:'子',2:'丑',3:'寅',4:'卯',5:'辰',6:'巳',7:'午',8:'未',9:'申'};
var TAO={子:1,卯:1,午:1,酉:1};
var CK={丑:1,辰:1,未:1,戌:1};
var DAYUN=[[10,20,'乾','金'],[20,30,'兑','金'],[30,40,'离','火'],[40,50,'震','木'],[50,60,'巽','木'],[60,70,'坎','水'],[70,80,'艮','土'],[80,99,'坤','土']];
function dy(age){for(var i=0;i<DAYUN.length;i++)if(age>=DAYUN[i][0]&&age<DAYUN[i][1])return{n:DAYUN[i][2],el:DAYUN[i][3],r:[DAYUN[i][0],DAYUN[i][1]]};return age<10?{n:'乾',el:'金',r:[10,20]}:{n:'坤',el:'土',r:[80,90]}}

// ====== 二、号码解析层 ======
function parse(digits,age,gender,dur){
  var d=digits.split(''),ec={金:0,木:0,水:0,火:0,土:0},gc={};
  for(var i=0;i<4;i++){var el=E2N[d[i]],g=N2G[d[i]];ec[el]=(ec[el]||0)+1;gc[g]=(gc[g]||0)+1}
  var domE='',dc=0;for(var e in ec)if(ec[e]>dc){domE=e;dc=ec[e]}
  var domG=[];for(var g in gc)if(gc[g]>=2)domG.push(g);
  var bz=(d[0]===d[1]&&d[1]===d[2]&&d[2]===d[3]);
  var acc=false;for(var i=0;i<3;i++){var e1=E2N[d[i]],e2=E2N[d[i+1]];if((e1==='火'&&e2==='金')||(e1==='金'&&e2==='木'))acc=true}
  var pal=[{n:'父母宫',dg:d[0],el:E2N[d[0]],g:N2G[d[0]],dz:DZ[d[0]]},{n:'夫妻宫',dg:d[1],el:E2N[d[1]],g:N2G[d[1]],dz:DZ[d[1]]},{n:'自身宫',dg:d[2],el:E2N[d[2]],g:N2G[d[2]],dz:DZ[d[2]]},{n:'子女宫',dg:d[3],el:E2N[d[3]],g:N2G[d[3]],dz:DZ[d[3]]}];
  var self=pal[2],spEl=pal[1].el,selfEl=self.el;
  var spR='';if(ke(spEl,selfEl))spR='ks';else if(ke(selfEl,spEl))spR='sk';else if(se(spEl,selfEl))spR='ss';else if(se(selfEl,spEl))spR='ss2';else spR='bh';
  var ddy=dy(age),dyR='';
  if(se(ddy.el,selfEl))dyR='ss';else if(ke(ddy.el,selfEl))dyR='ks';else if(se(selfEl,ddy.el))dyR='ss2';else if(ke(selfEl,ddy.el))dyR='sk';else dyR='bh';
  var ht=false,hc=false;for(var i=0;i<4;i++){if(TAO[DZ[d[i]]])ht=true;if(CK[DZ[d[i]]])hc=true}
  var sq=false;for(var i=0;i<2;i++)if(Math.abs(parseInt(d[i+1])-parseInt(d[i]))===1)sq=true;
  return{digits:d,ec:ec,gc:gc,domE:domE,domG:domG,bz:bz,acc:acc,pal:pal,self:self,spR:spR,dy:ddy,dyR:dyR,ht:ht,hc:hc,sq:sq,age:age,gender:gender,dur:dur};
}

// ====== 三、人格原型库（12种） ======
var ARCH={
  A:{name:'开拓领导者',sub:'掌控·执行·竞争·扩张',ks:['掌控','执行','竞争','扩张'],radar:[85,75,55,60,40,65],
    career:['年轻时容易和权威碰撞——不是你不服管，是你脑子转得比别人快。','适合从执行岗走向管理岗，天生就该管人。','骨子里喜欢掌控工作节奏，被管着浑身不自在。','创业或独立带队的概率比一般人高。','中后期自然成为制定规则的那个人。'],
    wealth:['赚钱嗅觉灵敏，敢于下注——赚钱速度比一般人快。','守财是短板：赚得快、花得也快，流水大沉淀少。','容易有大起大落的财务波动，需要设止损线。','适合进攻型投资，但要给自己留足后路。'],
    love:['主动出击型——遇到喜欢的人不犹豫。','关系初期热度高，后期维护需要下功夫。','容易吸引欣赏你魄力的人。','需要学会在关系中适当示弱——不是认输，是给对方面子。'],
    marry:['婚姻里要找一个能平衡你强势的人。','家庭决策权在你手里是自然的——但别忘了给对方空间。','容易因为工作太投入忽略家庭时间。','合适的人会让你的锋芒在婚姻里变成铠甲而不是刺。'],
    health:['长期高压容易心血管负担——你的节奏太快，身体有时跟不上。','注意头痛、骨骼关节——硬扛是习惯但不是美德。','主动安排休息日——你的身体不会自己喊停。'] },
  B:{name:'资源整合者',sub:'协调·稳定·积累·经营',ks:['协调','稳定','积累','经营'],radar:[60,80,60,70,75,60],
    career:['你不是最早成功的人，但往往是最能留在牌桌上的人。','资源会随着时间向你集中——越往后越有分量。','适合运营型岗位和长期经营型平台。','不适合频繁跳槽——你的价值在于深耕。','稳定积累比短期爆发更适合你。'],
    wealth:['财富来自长期积累，不是一夜暴富。','擅长经营已有资源——把钱放在能生钱的地方。','投资风格偏稳健，不喜欢高杠杆。','赚钱曲线偏平但持续向上——复利是你的朋友。'],
    love:['进入关系速度慢，需要时间观察和了解。','不轻易表达情绪，但一旦认定就很专一。','容易吸引务实、稳重型的人。','安全感对你来说比激情更重要。'],
    marry:['非常适合长期婚姻经营——你有把日子过长的能力。','家庭责任你会扛得稳稳当当。','别把稳定过成无聊——偶尔制造惊喜。','婚姻对你不是约束，是后盾。'],
    health:['注意脾胃和消化系统——压力大了胃先知道。','长期坐着的习惯需要刻意打破。','保持适度运动——不是为身材，是为续航。'] },
  C:{name:'谋略观察者',sub:'洞察·布局·思考·耐心',ks:['洞察','布局','思考','耐心'],radar:[50,60,70,50,50,75],
    career:['别人看到的是结果，你更关注背后的逻辑和过程。','适合研究、分析、策略型岗位——深度是你的护城河。','不适合一线快节奏岗位——那不是你的战场。','积累足够后会迎来属于你的爆发点。'],
    wealth:['擅长发现被低估的机会——你有自己的判断。','投资风格偏稳健和长期——不跟风、不追涨。','赚钱节奏不快但稳定，很少大亏。','不适合短线和高风险操作。'],
    love:['感情上比较慢热和慎重——不是冷漠，是对自己负责。','需要时间观察才会真正打开心扉。','容易吸引欣赏你深度的人。','过于理性有时让对方觉得你不够热情。'],
    marry:['婚姻中需找一个能理解你深度和沉默的人。','不是浪漫型伴侣，但是可靠型伴侣。','沟通中需要多表达感受——她/他不是你肚子里的蛔虫。'],
    health:['思虑过多影响睡眠——脑子停不下来。','注意肾脏和泌尿系统。','需要学会"不想事"的放松方式。'] },
  D:{name:'魅力传播者',sub:'表达·影响·热情·创意',ks:['表达','影响','热情','创意'],radar:[60,65,80,80,55,50],
    career:['适合台前和传播型工作——你需要一个舞台。','表达力是你最大的武器——别人需要学，你不用。','不适合长期待在幕后或做重复性工作。','创意多、点子多——但需要有人帮你落地。'],
    wealth:['财富与曝光度和人脉直接相关。','适合靠影响力变现——流量是你最好的资产。','花钱比较随性——需要强制储蓄这个习惯。','赚钱机会多但要学会筛选——不是每个机会都值得追。'],
    love:['桃花运比较活跃——不缺认识新人的机会。','感情热度高，但维持温度需要用心。','容易吸引同样开朗外向的人。','热闹过后的安静陪伴，才是感情的真正底色。'],
    marry:['婚姻需要找一个能接住你情绪起伏的人。','热情过后需要稳定来支撑长期关系。','别把婚姻也当成展示舞台——家是港湾，不是秀场。'],
    health:['注意心脏、眼睛、心血管——你的节奏快，心脏负担大。','容易上火、失眠——学会管理情绪就是管理健康。'] },
  E:{name:'稳健经营者',sub:'安全·责任·规划·稳定',ks:['安全','责任','规划','稳定'],radar:[50,75,55,60,80,55],
    career:['天生适合体制内、大公司、长期项目——你不是冒险家。','稳扎稳打型，晋升偏慢但很少掉队。','不适合风险过高或变动频繁的环境。','中后期积累的优势会逐渐显现——不争一时。'],
    wealth:['财富来自持续稳定的积累——滴水穿石。','非常适合长期定投和储蓄型理财。','不冒险、不跟风、不冲动消费。','守财能力强——钱在你手里跑不掉。'],
    love:['重视安全感和长期承诺——你不是玩玩的类型。','进入关系前会认真评估——谨慎是负责。','容易吸引同样稳重可靠的人。','感情上有时候需要推自己一把才主动。'],
    marry:['婚姻责任感强——你会是过日子的好伴侣。','家庭财务交给你规划，基本不会出大问题。','关系稳定但不够浪漫——偶尔需要主动升温。'],
    health:['注意脾胃和消化——规律被打乱时最容易出状况。','长期久坐办公注意腰椎颈椎。','体检不能省——早发现早处理是你的风格。'] },
  F:{name:'创新探索者',sub:'好奇·突破·变化·学习',ks:['好奇','突破','变化','学习'],radar:[55,55,70,75,50,70],
    career:['适合创新、科技、创业型领域——新鲜的才有意思。','不适合重复性高的工作——你会憋坏的。','经常换方向不是缺点——是你的探索方式。','多领域交叉反而发挥优势——通才比专才更适合你。'],
    wealth:['财富来源多样——不依赖单一收入。','适合尝试副业和多元投资。','但容易在新鲜事物上冲动花钱。','建议设一个"不动本金"——给自己留好底线。'],
    love:['感情上追求新鲜感和共同成长。','不喜欢一成不变的关系模式。','容易吸引同样有趣、爱折腾的人。','保持新鲜感是你的天赋——但也要学会专注。'],
    marry:['婚姻中需要足够自由度和空间。','不适合被管得太紧的关系。','找到一个同样热爱生活的人，你的婚姻会很精彩。'],
    health:['注意神经系统和肝胆——你太能折腾了。','作息不规律是常态——但身体会记账。','学会给自己设"休息日"——关机一天不是罪。'] },
  G:{name:'理性分析师',sub:'逻辑·数据·规律·推演',ks:['逻辑','数据','规律','推演'],radar:[50,60,45,40,65,80],

// ====== 四、人格映射（先画像，再判断） ======
function archetype(comp){
  var ec=comp.ec,gc=comp.gc,domE=comp.domE,domG=comp.domG;

  // 先看卦象主导
  if(gc['乾']>=2 && ec['金']>=2) return 'A';
  if(gc['兑']>=2) return 'K';
  if(gc['离']>=2 && ec['火']>=2) return 'D';
  if(gc['震']>=2) return ec['火']>=1?'I':'F';
  if(gc['巽']>=2) return 'F';
  if(gc['坎']>=2) return 'C';
  if(gc['艮']>=2) return 'J';
  if(gc['坤']>=2){
    if(ec['土']>=3) return 'B';
    if(comp.ec['金']>=1 && comp.ec['木']>=1) return 'L';
    return ec['土']>=2?'E':'H';
  }

  // 再看元素主导
  if(domE==='金'){
    if(ec['水']>=1 && ec['木']>=1) return 'G';
    return 'A';
  }
  if(domE==='木'){
    if(ec['火']>=2) return 'I';
    if(ec['水']>=1) return 'F';
    return 'F';
  }
  if(domE==='水'){
    if(ec['金']>=1) return 'G';
    return 'C';
  }
  if(domE==='火'){
    if(ec['木']>=1) return 'F';
    if(gc['兑']>=1) return 'K';
    return 'D';
  }
  if(domE==='土'){
    if(ec['金']>=2) return 'A';
    if(ec['土']>=3) return 'B';
    if(ec['木']>=1) return 'L';
    return 'E';
  }

  if(comp.bz){
    if(domE==='金') return 'A'; if(domE==='火') return 'D';
    if(domE==='水') return 'C'; if(domE==='木') return 'F'; return 'E';
  }
  return 'L';
}

// ====== 五、特征标签生成（号码专属） ======
function genTags(comp){
  var tags=[], ec=comp.ec, gc=comp.gc, domE=comp.domE, domG=comp.domG;
  var tagMap={
    金:{few:'原则感',many:'控制力',extra:'果断'},
    木:{few:'成长型',many:'进取心',extra:'直率'},
    水:{few:'灵活',many:'谋略',extra:'聪明'},
    火:{few:'热情',many:'冲劲',extra:'行动力'},
    土:{few:'务实',many:'稳重',extra:'可靠'}
  };
  // 主导元素标签
  tags.push(tagMap[domE][ec[domE]>=3?'many':ec[domE]>=2?'many':'few']);
  if(ec[domE]>=3) tags.push(tagMap[domE].extra);
  // 卦象标签
  var gTag={乾:'掌控感',兑:'表达力',离:'感染力',震:'驱动力',巽:'适应力',坎:'洞察力',艮:'定力',坤:'承载力'};
  for(var g in gc) if(gc[g]>=2) tags.push(gTag[g]);
  // 特殊结构标签
  if(comp.bz) tags.push('极致');
  if(comp.acc) tags.push('冲突感');
  if(comp.ht) tags.push('吸引力');
  if(comp.hc) tags.push('积累力');
  if(comp.sq) tags.push('连贯性');
  if(comp.spR==='ks') tags.push('关系压力');
  if(comp.spR==='sk') tags.push('关系主导');
  // 去重
  var seen={}, result=[];
  for(var i=0;i<tags.length;i++){if(!seen[tags[i]]){seen[tags[i]]=1;result.push(tags[i])}}
  return result.slice(0,8);
}

// ====== 九、雷达图SVG ======
function radarSVG(scores, comp){
  var labels=['事业','财富','感情','人际','健康','专业'];
  var cx=100,cy=100,r=80,levels=5;
  var paths=[];
  for(var l=1;l<=levels;l++){
    var pts=[];
    for(var i=0;i<6;i++){
      var angle=Math.PI/2+Math.PI*2*i/6;
      var lr=r*l/levels;
      pts.push((cx+lr*Math.cos(angle)).toFixed(1)+','+(cy-lr*Math.sin(angle)).toFixed(1));
    }
    paths.push('<polygon points="'+pts.join(' ')+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>');
  }
  for(var i=0;i<6;i++){
    var angle=Math.PI/2+Math.PI*2*i/6;
    paths.push('<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(angle)).toFixed(1)+'" y2="'+(cy-r*Math.sin(angle)).toFixed(1)+'" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>');
  }
  var dataPts=[];
  for(var i=0;i<6;i++){
    var angle=Math.PI/2+Math.PI*2*i/6;
    var vr=scores[i]/100*r;
    dataPts.push((cx+vr*Math.cos(angle)).toFixed(1)+','+(cy-vr*Math.sin(angle)).toFixed(1));
  }
  paths.push('<polygon points="'+dataPts.join(' ')+'" fill="rgba(201,160,64,0.15)" stroke="rgba(201,160,64,0.7)" stroke-width="1.2"/>');
  for(var i=0;i<6;i++){
    var angle=Math.PI/2+Math.PI*2*i/6;
    var vr=scores[i]/100*r;
    paths.push('<circle cx="'+(cx+vr*Math.cos(angle)).toFixed(1)+'" cy="'+(cy-vr*Math.sin(angle)).toFixed(1)+'" r="2.2" fill="#c9a040"/>');
  }
  for(var i=0;i<6;i++){
    var angle=Math.PI/2+Math.PI*2*i/6;
    var lr=r+16,lx=cx+lr*Math.cos(angle),ly=cy-lr*Math.sin(angle);
    paths.push('<text x="'+lx.toFixed(1)+'" y="'+(ly+4).toFixed(1)+'" text-anchor="middle" fill="#888478" font-size="9">'+labels[i]+'</text>');
  }
  return '<svg viewBox="0 0 200 200" style="width:200px;height:200px">'+paths.join('')+'</svg>';
}

// ====== 十一、事件 ======
var isUnlocked=false,currentData=null;

function showError(m){var el=document.getElementById('errorMsg');el.textContent=m;el.style.display='block'}

function startAnalysis(){
  try{
    var ds=document.getElementById('phoneDigits').value.trim();
    var dur=document.getElementById('duration').value;
    var gd=document.getElementById('gender').value;
    var ag=parseInt(document.getElementById('age').value);
    if(!/^\d{4}$/.test(ds)){showError('请输入4位数字');return}
    if(!dur){showError('请选择使用时长');return}
    if(!gd){showError('请选择性别');return}
    if(!ag||isNaN(ag)||ag<10||ag>100){showError('请输入有效年龄');return}
    try{isUnlocked=localStorage.getItem('npa2_unlocked')==='true'}catch(e){isUnlocked=false}

    var comp=parse(ds,ag,gd,parseFloat(dur));
    comp.pid=archetype(comp);
    var arch=ARCH[comp.pid];
    var ct=genContradiction(comp,arch);

    var gen={
      comp:comp, arch:arch, ct:ct,
      freeC:freeLine('career',comp,arch),
      freeW:freeLine('wealth',comp,arch),
      freeL:freeLine('love',comp,arch)
    };
    currentData=gen;
    render(gen);
    document.getElementById('resultsSection').style.display='block';
    document.getElementById('resultsSection').scrollIntoView({behavior:'smooth'});
  }catch(e){showError('出错: '+e.message);console.error(e)}
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('jsStatus').style.display='block';
  try{isUnlocked=localStorage.getItem('npa2_unlocked')==='true'}catch(e){}
  var btn=document.getElementById('analyzeBtn');if(btn)btn.addEventListener('click',startAnalysis);
  var pi=document.getElementById('phoneDigits');if(pi)pi.addEventListener('input',function(){this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)});
  var rs=document.getElementById('resultsSection');
  rs.addEventListener('click',function(e){
    if(e.target.closest('#qrBox')){var u=document.getElementById('qrUpload');if(u)u.click()}
    if(e.target.closest('#unlockBtn'))unlock();
  });
  rs.addEventListener('change',function(e){if(e.target.id==='qrUpload')handleQR(e)});
});

function handleQR(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var i=document.getElementById('qrImg');i.src=ev.target.result;i.style.display='block';document.getElementById('qrText').style.display='none'};r.readAsDataURL(f)}
function unlock(){var c=document.getElementById('unlockCode').value.trim();if(['8888','2026','6688'].indexOf(c)>=0){isUnlocked=true;try{localStorage.setItem('npa2_unlocked','true')}catch(e){}var pw=document.getElementById('paywall');if(pw)pw.style.display='none';var ds=document.getElementById('detailSection');if(ds){ds.classList.remove('locked');ds.classList.add('unlocked')}}else{alert('解锁码错误。演示码：8888')}}
window.onerror=function(m,url,line){var el=document.getElementById('errorMsg');el.innerHTML='⚠ '+m+' (行:'+line+')';el.style.display='block';return false};
