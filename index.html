<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数字能量分析 - 手机号后四位解读</title>
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --gold: #d4a853;
  --gold-light: #f0d68a;
  --text: #e0d6c2;
  --text-dim: #8a8578;
  --accent: #c9a84c;
  --danger: #c0392b;
  --wood: #5b8c5a;
  --fire: #c0392b;
  --earth: #c9a84c;
  --metal: #d4c5a0;
  --water: #2e6b8a;
  --border: #2a2a3e;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(212,168,83,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(46,107,138,0.04) 0%, transparent 50%);
}

.container { max-width: 500px; margin: 0 auto; padding: 16px; }

/* Header */
.header {
  text-align: center;
  padding: 32px 0 20px;
}
.header .icon {
  width: 64px; height: 64px;
  margin: 0 auto 12px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2a1f0a, #4a3510);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  border: 1px solid var(--gold);
}
.header h1 { font-size: 22px; color: var(--gold-light); font-weight: 600; letter-spacing: 2px; }
.header p { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

/* Form */
.form-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.form-card h2 {
  font-size: 16px; color: var(--gold-light); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.form-card h2::before { content:''; width:3px; height:16px; background:var(--gold); border-radius:2px; }

.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px;
  letter-spacing: 1px;
}
.form-group input, .form-group select {
  width: 100%; padding: 12px 14px;
  background: #12121f;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  transition: border-color 0.3s;
  outline: none;
  font-family: inherit;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--gold);
}
.form-group input::placeholder { color: #4a4558; }
.form-group .hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

.phone-input {
  display: flex; gap: 8px; align-items: center;
}
.phone-input span { color: var(--text-dim); font-size: 14px; white-space: nowrap; }
.phone-input input {
  flex: 1; padding: 12px 14px;
  background: #12121f;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 20px; text-align: center; letter-spacing: 6px;
  outline: none; font-family: inherit;
  max-width: 160px;
}
.phone-input input:focus { border-color: var(--gold); }

.btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #8b6914, #b8941f);
  color: #1a1a0a;
  border: none; border-radius: 8px;
  font-size: 17px; font-weight: 600;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
}
.btn:hover { background: linear-gradient(135deg, #9c7a1a, #c9a830); transform: translateY(-1px); }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; pointer-events: none; }

/* Results */
.results-section { display: none; }

.result-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.result-card h3 {
  font-size: 15px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.result-card h3 .emoji { font-size: 20px; }

.free-result {
  color: var(--text);
  font-size: 14px;
  line-height: 1.8;
}
.free-result p { margin-bottom: 4px; }

/* Analysis summary */
.analysis-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  margin-right: 4px;
}
.badge-good { background: rgba(91,140,90,0.2); color: #6bae6a; }
.badge-warn { background: rgba(201,168,76,0.2); color: #d4b860; }
.badge-bad { background: rgba(192,57,43,0.2); color: #e0554a; }
.badge-info { background: rgba(46,107,138,0.2); color: #5ba0c8; }

/* Paywall */
.paywall {
  background: linear-gradient(135deg, #1a1a0f, #1f1a0a);
  border: 2px dashed var(--gold);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  margin: 20px 0;
  position: relative;
}
.paywall::before {
  content: '🔒';
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  font-size: 28px;
  background: var(--bg); padding: 0 8px;
}
.paywall h3 { color: var(--gold-light); font-size: 17px; margin: 8px 0 4px; }
.paywall .price { font-size: 28px; color: var(--gold); font-weight: 700; margin: 8px 0; }
.paywall .price small { font-size: 14px; }
.paywall p { font-size: 13px; color: var(--text-dim); margin: 6px 0; }

.qr-placeholder {
  width: 180px; height: 180px;
  margin: 16px auto;
  background: #fff;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #999; font-size: 13px;
  flex-direction: column; gap: 8px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.qr-placeholder img { width: 100%; height: 100%; object-fit: contain; }
.qr-placeholder .qr-hint {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.6);
  color: #fff; font-size: 11px; padding: 4px;
  text-align: center;
}

.unlock-input {
  display: flex; gap: 8px; margin-top: 12px;
}
.unlock-input input {
  flex: 1; padding: 10px 12px;
  background: #12121f;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px; text-align: center;
  outline: none; font-family: inherit;
}
.unlock-input input:focus { border-color: var(--gold); }
.unlock-input button {
  padding: 10px 20px;
  background: var(--gold);
  border: none; border-radius: 6px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}

/* Detailed locked */
.detail-locked {
  filter: blur(4px);
  pointer-events: none;
  user-select: none;
  position: relative;
  opacity: 0.4;
}
.detail-unlocked {
  filter: none;
  pointer-events: auto;
  user-select: auto;
  opacity: 1;
}

.detail-section {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 13px;
  line-height: 1.9;
  color: #c5bfb0;
}
.detail-section strong { color: var(--gold-light); }
.detail-section .highlight { color: var(--accent); font-weight: 600; }

/* Element tags */
.element-tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
}
.e-metal { background: rgba(212,197,160,0.2); color: #d4c5a0; }
.e-wood { background: rgba(91,140,90,0.2); color: #6bae6a; }
.e-water { background: rgba(46,107,138,0.2); color: #5ba0c8; }
.e-fire { background: rgba(192,57,43,0.2); color: #e0554a; }
.e-earth { background: rgba(201,168,76,0.2); color: #d4b860; }

/* Grid for palace overview */
.palace-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 12px 0;
}
.palace-item {
  background: #12121f;
  border-radius: 8px;
  padding: 12px;
  text-align: center;
  border: 1px solid var(--border);
}
.palace-item .label { font-size: 11px; color: var(--text-dim); }
.palace-item .digit { font-size: 28px; font-weight: 700; letter-spacing: 2px; }
.palace-item .element { font-size: 12px; margin-top: 2px; }

.divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

.footer {
  text-align: center;
  padding: 20px;
  font-size: 11px;
  color: var(--text-dim);
}

.error-msg {
  background: rgba(192,57,43,0.15);
  border: 1px solid rgba(192,57,43,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #e0554a;
  margin-bottom: 12px;
  display: none;
}

/* Scroll animation */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-card { animation: fadeInUp 0.5s ease forwards; }
.result-card:nth-child(2) { animation-delay: 0.1s; }
.result-card:nth-child(3) { animation-delay: 0.2s; }
.result-card:nth-child(4) { animation-delay: 0.3s; }
.result-card:nth-child(5) { animation-delay: 0.4s; }
.result-card:nth-child(6) { animation-delay: 0.5s; }
.result-card:nth-child(7) { animation-delay: 0.6s; }
</style>
</head>

<div class="container">

<div id="jsStatus" style="text-align:center;font-size:11px;color:#5b8c5a;margin-top:8px;display:none;">✅ 系统就绪</div>

// ============================================================
// 五行运算
// ============================================================

// 五行相生: 木→火→土→金→水→木
const SHENG_MAP = {'木':'火','火':'土','土':'金','金':'水','水':'木'};
// 五行相克: 金→木→土→水→火→金
const KE_MAP = {'金':'木','木':'土','土':'水','水':'火','火':'金'};

// 判断A是否生B
function isSheng(a, b) { return SHENG_MAP[a] === b; }
// 判断A是否克B
function isKe(a, b) { return KE_MAP[a] === b; }

// 获取十神关系: 自身元素 vs 对方元素, 是否同性
function getShiShen(selfElem, otherElem, selfYinYang, otherYinYang) {
  const same = (selfYinYang === otherYinYang);
  if (isKe(otherElem, selfElem)) {
    // 克我者=官鬼
    return same ? '七杀' : '正官';
  }
  if (isKe(selfElem, otherElem)) {
    // 我克者=财
    return same ? '偏财' : '正财';
  }
  if (isSheng(otherElem, selfElem)) {
    // 生我者=印
    return same ? '偏印' : '正印';
  }
  if (isSheng(selfElem, otherElem)) {
    // 我生者=食伤
    return same ? '伤官' : '食神';
  }
  // 同我者=比劫
  return same ? '比肩' : '劫财';
}

// 十神吉凶(来自文件: 我克者为吉,克我者为凶。生我者为吉,我生者为凶)
function shiShenJiXiong(shen) {
  if (shen === '正财' || shen === '偏财') return '吉';   // 我克
  if (shen === '七杀' || shen === '正官') return '凶';   // 克我
  if (shen === '正印' || shen === '偏印') return '吉';   // 生我
  if (shen === '食神' || shen === '伤官') return '凶';   // 我生
  if (shen === '比肩' || shen === '劫财') return '平';   // 比合
  return '平';
}

// ============================================================
// 六十甲子查询
// ============================================================

function getYearJiazi(year) {
  // 1984是甲子年(index 0 of the 60-year cycle starting from 甲子)
  const baseYear = 1984;
  let offset = ((year - baseYear) % 60 + 60) % 60;
  return SIXTY_JIAZI[offset];
}

function getCurrentYearJiazi() {
  return getYearJiazi(2026);
}

// ============================================================
// 大运分析
// ============================================================

function getDayun(selfDigit, age) {
  const bagua = DIGIT_BAGUA[selfDigit];
  const dayunElement = BAGUA_ELEMENT[bagua];
  const selfElement = DIGIT_ELEMENT[selfDigit];

  // 找到当前年龄所在的大运
  let currentDayunBagua = null;
  let currentDayunElement = null;
  let currentDayunRange = null;

  for (let [bg, [start, end]] of Object.entries(BAGUA_DAYUN)) {
    if (age >= start && age < end) {
      currentDayunBagua = bg;
      currentDayunElement = BAGUA_ELEMENT[bg];
      currentDayunRange = [start, end];
      break;
    }
  }

  // 如果年龄超出范围
  if (!currentDayunBagua) {
    if (age < 10) { currentDayunBagua='乾'; currentDayunElement='金'; currentDayunRange=[10,20]; }
    else { currentDayunBagua='坤'; currentDayunElement='土'; currentDayunRange=[80,90]; }
  }

  // 大运与自身的关系
  let relation = '';
  let desc = '';
  let level = '平'; // 吉/凶/平

  if (isSheng(currentDayunElement, selfElement)) {
    relation = '大运生自身';
    desc = '大运生你，有利桃花运、贵人出现、事业顺利、利交友';
    level = '吉';
  } else if (isKe(currentDayunElement, selfElement)) {
    relation = '大运克自身';
    desc = '大运克你，事业不顺、各方面较坎坷、易出现小人、伤灾、口舌、意外、破财';
    level = '凶';
  } else if (currentDayunElement === selfElement) {
    relation = '大运比合';
    desc = '大运与你比合，得事业运助、利工作、利交友';
    level = '吉';
  } else if (isSheng(selfElement, currentDayunElement)) {
    relation = '自身生大运';
    desc = '你生大运，泄自身之气，做事操心费力、付出多、求财费力';
    level = '凶';
  } else if (isKe(selfElement, currentDayunElement)) {
    relation = '自身克大运';
    desc = '你克大运，易求财、利做生意、但也可能有外遇倾向';
    level = '吉';
  }

  return {
    bagua: currentDayunBagua,
    element: currentDayunElement,
    range: currentDayunRange,
    selfElement,
    relation,
    desc,
    level
  };
}

function getLiuNian(selfElement, selfYinYang) {
  const current = getCurrentYearJiazi(); // 2026 丙午
  const yearStem = current.stem;
  const yearBranch = current.branch;
  const yearElement = STEM_ELEMENT[yearStem]; // 丙=火
  const yearYinYang = STEM_YINYANG[yearStem];

  let relation = '';

  let level = '平';

    relation = '流年克自身';
    desc = '今年压力较大，注意口舌是非、健康问题，凡事谨慎';

  };
}

// ============================================================
// 主分析函数
// ============================================================

function analyze(digits, duration, gender, age) {
  const d0=digits[0], d1=digits[1], d2=digits[2], d3=digits[3];

  // 四宫元素
  const parentElem = DIGIT_ELEMENT[d0];   // 父母宫
  const spouseElem = DIGIT_ELEMENT[d1];   // 夫妻宫
  const selfElem = DIGIT_ELEMENT[d2];     // 自身宫
  const childElem = DIGIT_ELEMENT[d3];    // 子女宫

  // 四宫八卦
  const selfBagua = DIGIT_BAGUA[d2];
  const spouseBagua = DIGIT_BAGUA[d1];

  // 自身八卦性格
  const personality = BAGUA_PERSONALITY[selfBagua];

  // 判断阴阳(同性/异性)：用数字的奇偶来近似判断阴阳
  // 奇数为阳,偶数为阴 → 近似天干阴阳
  function isYang(d) { return parseInt(d) % 2 === 1; }

  // 十神关系(各宫对自身宫)
  const selfYinYang = isYang(d2) ? '阳' : '阴';
  const parentSS = getShiShen(selfElem, parentElem, selfYinYang, isYang(d0)?'阳':'阴');
  const spouseSS = getShiShen(selfElem, spouseElem, selfYinYang, isYang(d1)?'阳':'阴');
  const childSS = getShiShen(selfElem, childElem, selfYinYang, isYang(d3)?'阳':'阴');

  // 大运分析
  const dayun = getDayun(d2, age);

  // 流年分析
  const liunian = getLiuNian(selfElem, selfYinYang);

  // 特殊组合检测
  const isAllSame = new Set(digits).size === 1; // 豹子号
  const hasAccidentCombo = checkAccidentCombo(digits);

  // 夫妻宫克自身
  const spouseKeSelf = isKe(spouseElem, selfElem);
  // 自身克夫妻宫
  const selfKeSpouse = isKe(selfElem, spouseElem);

  // 地支映射(用于健康分析)
  const selfDizhi = digitToDizhi(d2);
  var dizhiAll = [];
  for (var i = 0; i < digits.length; i++) {
    dizhiAll.push(digitToDizhi(digits[i]));
  }

  // 是否桃花
  const hasTaohua = dizhiAll.some(dz => TAOHUA.has(dz));
  // 是否有财库
  const hasCaiku = dizhiAll.some(dz => CAIKU.has(dz));

  // 返回完整分析结果
  return {
    digits,
    duration,
    gender,
    age,
    palaces: [
      {name:'父母宫', digit:d0, element:parentElem, bagua:DIGIT_BAGUA[d0], shiShen:parentSS, dizhi:digitToDizhi(d0)},
      {name:'夫妻宫', digit:d1, element:spouseElem, bagua:spouseBagua, shiShen:spouseSS, dizhi:digitToDizhi(d1)},
      {name:'自身宫', digit:d2, element:selfElem, bagua:selfBagua, shiShen:'自身', dizhi:selfDizhi},
      {name:'子女宫', digit:d3, element:childElem, bagua:DIGIT_BAGUA[d3], shiShen:childSS, dizhi:digitToDizhi(d3)}
    ],
    self: {digit:d2, element:selfElem, bagua:selfBagua, yinYang:selfYinYang, dizhi:selfDizhi},
    personality,
    parentSS, spouseSS, childSS,
    dayun, liunian,
    isAllSame, hasAccidentCombo,
    spouseKeSelf, selfKeSpouse,
    hasTaohua, hasCaiku,
    dizhiAll
  };
}

function checkAccidentCombo(digits) {
  // 车祸组合: 火克金, 金克木
  for (let i = 0; i < 3; i++) {
    const e1 = DIGIT_ELEMENT[digits[i]];
    const e2 = DIGIT_ELEMENT[digits[i+1]];
    if ((e1==='火' && e2==='金') || (e1==='金' && e2==='木')) return true;
  }
  return false;
}

  var isAllSame = data.isAllSame, hasAccidentCombo = data.hasAccidentCombo;
  var spouseKeSelf = data.spouseKeSelf, selfKeSpouse = data.selfKeSpouse;
  var hasTaohua = data.hasTaohua, hasCaiku = data.hasCaiku;
  var parentSS = data.parentSS, spouseSS = data.spouseSS, childSS = data.childSS;
  var gender = data.gender;
  var spousePalace = palaces[1];
  var caiElement = KE_MAP[self.element];
  var caiPositions = [];
  for (var i = 0; i < palaces.length; i++) {
    if (palaces[i].digit !== self.digit && palaces[i].element === caiElement) {
      caiPositions.push(palaces[i]);
    }
  }

  // 辅助: 夫妻宫关系类型
  var spouseRel = '';
  if (spouseKeSelf) spouseRel = '克自身';
  else if (selfKeSpouse) spouseRel = '自身克';
  else if (isSheng(spousePalace.element, self.element)) spouseRel = '生自身';
  else if (isSheng(self.element, spousePalace.element)) spouseRel = '自身生';
  else spouseRel = '比合';

  // ====== 性格 ======
  var trait = ELEM_CHAR[self.element].trait;
  var persFree = '性格' + trait + '。';
  if (isAllSame) persFree += ' 号码四位相同，个性极度鲜明，但也容易走极端——要么成大事，要么栽在自己脾气上。';
  if (spouseRel === '自身克') persFree += ' 习惯自己做主，不太喜欢别人指手画脚。';
  if (spouseRel === '生自身') persFree += ' 为人处世比较柔和，容易得到别人好感。';

  var persDetail = '你骨子里是个' + trait.split('、').slice(0,2).join('、') + '的人。';
  persDetail += '做事风格偏向' + (self.element==='金'?'雷厉风行，定了就干，不拖泥带水':self.element==='木'?'一路往前冲，遇到困难也不轻易回头':self.element==='水'?'善于变通，不在一棵树上吊死，总能找到新路子':self.element==='火'?'想到就做，行动比想法快，热情来得快去得也快':self.element==='土'?'稳扎稳打，不急不躁，但决定了就不会轻易改':'灵活应变') + '。<br>';
  if (isAllSame) {
    persDetail += '<strong>特别注意：</strong>号码四位相同，能量极度集中。优点是目标感极强、做事专注；缺点是容易钻牛角尖，听不进别人的意见。建议身边留一个敢跟你说真话的人，能帮你踩刹车。<br>';
  }
  persDetail += '在人际交往中，你' + (spouseRel==='克自身'?'需要注意别太委屈自己，有时候明明你有道理却选择沉默':spouseRel==='自身克'?'是比较有主见的一方，朋友和同事会不自觉听你的——但注意别给人压迫感':spouseRel==='生自身'?'容易被人喜欢和接纳，亲和力是你的天然优势':'待人接物比较自然，不刻意讨好也不刻意疏远') + '。';

  // ====== 事业 ======
  var dc = DAYUN_CAREER[dayun.relation] || DAYUN_CAREER['大运比合'];
  var careerFree = dc.free;
  careerFree += ' ' + (dayun.level==='吉'?'整体趋势向上。':'整体承压，稳住就好。');

  var careerDetail = dc.detail + '<br>';
  if (parentSS==='正印'||parentSS==='偏印') {
    careerDetail += '<strong>贵人运：</strong>你的领导或长辈中有人是真想帮你的。关键时候别硬扛，开口求助比什么都管用。<br>';
  } else if (parentSS==='七杀'||parentSS==='正官') {
    careerDetail += '<strong>压力来源：</strong>你的上级或环境对你的要求不低。这种压力短期难受，但长期来看反而逼着你成长。把考核当成磨刀石，别当成绊脚石。<br>';
  } else {
    careerDetail += '<strong>建议：</strong>现阶段不宜大动——跳槽、转行、创业都建议等一等。先把手里的事做扎实，机会是等来的，不是找来的。<br>';
  }
  careerDetail += '<strong>这一年（2026）：</strong>' + liunian.desc + '。' + (liunian.level==='吉'?'适合主动出击。':'宜稳守，不宜冒进。');

  // ====== 财运 ======
  var wealthFree = '', wealthDetail = '';
  if (caiPositions.length > 0) {
    wealthFree = WEALTH_LINES['caiInNumber'].free;
  } else {
    wealthFree = WEALTH_LINES['noCaiInNumber'].free;
  }
  if (dayun.level==='吉') wealthFree += ' 当前阶段赚钱机会比平时多。';
  if (hasCaiku) wealthFree += ' 有存钱意识，不是月光族。';

  wealthDetail = (caiPositions.length > 0 ? WEALTH_LINES['caiInNumber'].free : WEALTH_LINES['noCaiInNumber'].free) + '<br>';
  if (hasCaiku) {
    wealthDetail += WEALTH_LINES['hasCaiku'].detail + '<br>';
  } else {
    wealthDetail += WEALTH_LINES['noCaiku'].detail + '<br>';
  }
  var lwKey = liunian.relation;
  if (LIUNIAN_WEALTH[lwKey]) {
    wealthDetail += '<strong>今年财运：</strong>' + LIUNIAN_WEALTH[lwKey].text + '<br>';
  }
  wealthDetail += '<strong>建议：</strong>' + (hasCaiku?'你有存钱的底子，建议每年设定一个存款目标，看着数字涨会有成就感。':'建议弄个自动转存——每个月工资一到账先转一笔到另一个账户，剩下的才拿来花。') + ' 投资方面，' + (caiPositions.length>0?'可以适当激进，但要设止损线。':'稳健为主，别碰自己不熟悉的领域。');

  // ====== 感情 ======
  var sl = SPOUSE_LOVE[spouseRel] || SPOUSE_LOVE['比合'];
  var loveFree = sl.free;
  if (hasTaohua) loveFree += ' 异性缘不错，身边不缺机会。';
  if (spouseRel==='克自身'&&hasTaohua) loveFree += ' 桃花多但质量参差不齐，得擦亮眼。';

  var loveDetail = sl.detail + '<br>';
  if (gender === 'female') {
    loveDetail += '作为女性，';
    if (spouseSS==='正官') loveDetail += '你遇到正缘的概率不低——那种靠谱、有担当的人会被你吸引。';
    else if (spouseSS==='七杀') loveDetail += '你容易吸引个性强、甚至有点"野"的人。这类关系刺激但不太稳，要多观察对方的人品底色。';
    else loveDetail += '感情路上比较靠缘分，不急不躁反而容易遇到对的人。';
  } else {
    loveDetail += '作为男性，';
    if (spouseSS==='正财') loveDetail += '你容易遇到温柔顾家型的伴侣，感情基础稳固。';
    else if (spouseSS==='偏财') loveDetail += '你身边桃花比较旺，选择多了反而容易犹豫。记住：心动是本能，选择是本事。';
    else loveDetail += '感情比较随缘，不强求不抗拒，顺其自然就好。';
  }
  loveDetail += '<br>' + (hasTaohua?'桃花多不代表好事——关键看你能不能分辨谁是认真的、谁是路过的。':'桃花不算旺，但质量比数量重要。') + ' 建议' + (spouseRel==='克自身'?'遇到矛盾别冷战，主动开口不吃亏。':spouseRel==='自身克'?'偶尔示弱一下，让对方也有存在感。':spouseRel==='生自身'?'别把别人的好当成理所当然。':spouseRel==='自身生'?'关注自己的感受，付出要有底线。':'保持沟通频率，平淡中加点新鲜感。');

  // ====== 婚姻（与感情同一条件，换表达）=====
  var sm = SPOUSE_MARRY[spouseRel] || SPOUSE_MARRY['比合'];
  var marriageFree = sm.free;
  if (spouseRel==='比合'&&hasTaohua) marriageFree += ' 但外面诱惑也不少，已婚的话需要收心。';

  var marriageDetail = sm.detail + '<br>';
  marriageDetail += '从长期来看，' + (spouseRel==='克自身'?'这段婚姻需要双方都学让步。如果一方长期忍，总有爆发的一天。建议你主动建一个"吵架规则"——比如不过夜、不翻旧账。':'这段婚姻基础'+(spouseRel==='比合'||spouseRel==='生自身'?'不错':'需要用心经营')+'。'+(spouseRel==='自身克'?'你管得多不代表对方没想法，偶尔问一句"你觉得呢"，效果比想象的好。':''));
  marriageDetail += '<br>' + (gender==='male'?'作为丈夫，':'作为妻子，') + (spouseRel==='自身生'?'你扛了很多家庭责任，辛苦了。但家不是一个人的——适当让对方进入你的"责任区"，反而会让关系更紧密。':'家庭需要两个人一起经营，不是搭伙过日子。保持仪式感——纪念日、节日别省略，这些小事在婚姻里是大事。');

  // ====== 健康 ======
  var selfHT = HEALTH_TALK[self.dizhi] || '整体';
  var healthFree = '重点关注：' + selfHT + '。';
  if (hasAccidentCombo) healthFree += ' ⚠️ 号码中有冲撞信号，出行、开车、运动时多加小心。';
  if (parentSS==='七杀'||parentSS==='正官') healthFree += ' 压力大的时候身体容易出状况，别硬撑。';

  var healthDetail = '<strong>各部位需留意：</strong><br>';
  for (var j = 0; j < palaces.length; j++) {
    var ht = HEALTH_TALK[palaces[j].dizhi] || '整体';
    healthDetail += '· ' + palaces[j].name + '：' + ht + '<br>';
  }
  healthDetail += '<br><strong>核心养护方向：</strong>' + ELEM_CHAR[self.element].body + '是你的薄弱环节，日常多留意。<br>';
  healthDetail += '建议：规律作息、定期体检、' + (self.element==='火'||self.element==='金'?'少熬夜少生气，这两样最伤你的底子。':'饮食清淡、适量运动，比吃什么保健品都管用。');
  if (hasAccidentCombo) {
    healthDetail += '<br><br><strong>⚠️ 安全提醒：</strong>号码中出现冲撞组合，在' + (new Date().getFullYear()) + '年需格外注意交通安全。开车慢一点、走路别看手机、运动前热身。这不是吓你，是多一份小心。';
  }

  // ====== 家庭 ======
  var parentPalace = palaces[0], childPalace = palaces[3];
  var familyFree = '';
  if (shiShenJiXiong(parentSS)==='吉') familyFree += '家里长辈关系整体不错，有事能商量。';
  else familyFree += '家里琐事、责任事开始增多，和长辈沟通注意方式。';

  if (shiShenJiXiong(childSS)==='吉') {
    familyFree += ' 子女方面省心。';
  } else {
    familyFree += ' ' + (childSS==='食神'||childSS==='伤官'?'为子女操心不少，但孩子有自己的路。':'子女方面需要多花点时间陪伴。');
  }

  var familyDetail = '<strong>与长辈/父母：</strong>';
  if (parentSS==='正印'||parentSS==='偏印') {
    familyDetail += '父母或长辈是你的福星——在你困难时最能给你实质性支持的人大概率来自家里。有事多跟长辈沟通，他们的经验能帮你少走弯路。<br>';
  } else if (parentSS==='七杀'||parentSS==='正官') {
    familyDetail += '家里长辈对你要求不低，可能从小管得比较严。这让你有压力但也让你更有规矩。现在你跟长辈的关系，需要从"听话"过渡到"互相尊重"——你能自己做主了，但场面上还是要给长辈面子。<br>';
  } else {
    familyDetail += '长辈关系比较平稳，没有太大矛盾但也不算特别亲近。建议主动打打电话、回去看看，亲情是越走越近的。<br>';
  }

  familyDetail += '<strong>与子女/晚辈：</strong>';
  if (childSS==='食神'||childSS==='伤官') {
    familyDetail += '孩子聪明、有自己的想法，但需要你多花心思。你在孩子身上投入的精力会有回报——不是立刻，是长远来看。不要太焦虑，孩子有孩子的路。';
  } else if (childSS==='正官'||childSS==='七杀') {
    familyDetail += '孩子比较自律、有主见，不用你太操心。但可能跟你沟通不多——不是不亲近，是性格使然。多创造轻松的相处场景，比严肃的"谈心"效果好。';
  } else {
    familyDetail += '亲子关系比较自然，没有大的矛盾点。保持陪伴的质量比数量重要——在一起的时候就放下手机，专心陪。';
  }

  // ====== 总结 ======
  var summary = '<strong>📋 总结：</strong>';
  var goodCount = 0, badCount = 0;
  if (dayun.level==='吉') goodCount++; else if (dayun.level==='凶') badCount++;
  if (spouseRel==='生自身'||spouseRel==='比合') goodCount++; else if (spouseRel==='克自身') badCount++;
  if (caiPositions.length > 0) goodCount++;

  if (goodCount >= 2) {
    summary += '整体运势偏顺，' + (dayun.level==='吉'?'当前阶段是上升期，':'') + '抓住机会往前冲。需留意的是' + (hasAccidentCombo?'安全问题和':'') + (spouseRel==='克自身'?'感情中的沟通问题。':'身体健康。');
  } else if (badCount >= 2) {
    summary += '当前阶段压力不小，' + (dayun.level==='凶'?'大运在考验期，':'') + '熬过去就是成长。重点守住健康和感情两条底线，其他的慢慢来。';
  } else {
    summary += '运势有起有伏，不好不坏。关键是稳住心态——不贪心、不害怕，按自己的节奏走。';
  }

  return {
    personality: {free: persFree, detail: persDetail},
    career: {free: careerFree, detail: careerDetail},
    wealth: {free: wealthFree, detail: wealthDetail},
    love: {free: loveFree, detail: loveDetail},
    marriage: {free: marriageFree, detail: marriageDetail},
    health: {free: healthFree, detail: healthDetail},
    family: {free: familyFree, detail: familyDetail},
    summary: summary
  };
}

const DIMENSIONS = [
  {key:'personality', emoji:'🧠', label:'性格特质'},
  {key:'career', emoji:'💼', label:'事业运势'},
  {key:'wealth', emoji:'💰', label:'财运分析'},
  {key:'love', emoji:'💕', label:'感情运势'},
  {key:'marriage', emoji:'💍', label:'婚姻分析'},

  {key:'family', emoji:'👨‍👩‍👧', label:'家庭关系'}
];

let currentReport = null;
let isUnlocked = false;

// ====== 全局错误捕获 ======
window.onerror = function(msg, url, line, col, err) {
  var el = document.getElementById('errorMsg');
  el.innerHTML = '⚠️ JS错误: ' + msg + '<br>行: ' + line;
  el.style.display = 'block';
  el.style.background = 'rgba(192,57,43,0.8)';
  el.style.color = '#fff';
  el.style.padding = '12px';
  el.style.borderRadius = '8px';
  return false;
};

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = 'rgba(192,57,43,0.15)';
  el.style.color = '#e0554a';
  el.style.padding = '10px 14px';
  el.style.borderRadius = '8px';
}

function startAnalysis() {
  try {
    var digitsStr = document.getElementById('phoneDigits').value.trim();
    var duration = document.getElementById('duration').value;
    var gender = document.getElementById('gender').value;
    var ageStr = document.getElementById('age').value;
    var age = parseInt(ageStr);

    // 验证
    if (!/^\d{4}$/.test(digitsStr)) {
      showError('请输入4位数字的手机号后四位');
      return;
    }
    if (!duration) { showError('请选择使用时长'); return; }
    if (!gender) { showError('请选择性别'); return; }
    if (!ageStr || isNaN(age) || age < 10 || age > 100) {
      showError('请输入有效年龄（10-100岁）');
      return;
    }

    // 检查是否已解锁
    try {
      isUnlocked = localStorage.getItem('numPred_unlocked') === 'true';
    } catch(e) {
      isUnlocked = false;
    }

    // 执行分析
    var data = analyze(digitsStr, parseFloat(duration), gender, age);
    currentReport = generateReport(data);

    // 渲染
    renderResults(data, currentReport);

    // 滚动到结果
    document.getElementById('resultsSection').style.display = 'block';
    document.getElementById('resultsSection').scrollIntoView({behavior:'smooth'});
  } catch(e) {
    showError('分析出错: ' + e.message + ' (行:' + e.lineNumber + ')');
    console.error(e);
  }
}

  html += `<div class="result-card" style="border-left:3px solid var(--gold);">
    <h3><span class="emoji">📋</span> 综合总结 <span style="font-size:11px;color:var(--gold)">【深度】</span></h3>
    <div class="detail-section">${report.summary}</div>
  </div>`;
  html += `</div>`;

  document.getElementById('resultsSection').innerHTML = html;

  // 如果已解锁，隐藏付费墙
  if (isUnlocked) {
    document.getElementById('paywall').style.display = 'none';
  }
}

function handleQRUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.getElementById('qrImg');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('qrText').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function unlockReport() {
  const code = document.getElementById('unlockCode').value.trim();
  // 演示解锁码: 8888, 或可自定义其他验证逻辑
  const validCodes = ['8888', '2026', '6688'];

  if (validCodes.includes(code)) {
    isUnlocked = true;
    localStorage.setItem('numPred_unlocked', 'true');
    document.getElementById('paywall').style.display = 'none';
    document.getElementById('detailSection').classList.remove('detail-locked');
    document.getElementById('detailSection').classList.add('detail-unlocked');
    document.getElementById('detailSection').scrollIntoView({behavior:'smooth'});
  } else {
    alert('解锁码错误，请确认后重试。\n演示码：8888');
  }
}

// ====== 页面初始化(用事件监听替代onclick，确保WeChat兼容) ======
document.addEventListener('DOMContentLoaded', function() {
  // JS加载成功标记
  var jsStatus = document.getElementById('jsStatus');
  if (jsStatus) { jsStatus.style.display = 'block'; }

  // 检查解锁状态
  try {
    if (localStorage.getItem('numPred_unlocked') === 'true') {
      isUnlocked = true;
    }
  } catch(e) { isUnlocked = false; }

  // 分析按钮
  var btn = document.getElementById('analyzeBtn');
  if (btn) {
    btn.addEventListener('click', startAnalysis);
  }

  // 数字输入限制
  var phoneInput = document.getElementById('phoneDigits');
  if (phoneInput) {
    phoneInput.addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);
    });
  }

  // 二维码上传
  var qrBox = document.getElementById('qrBox');
  var qrUpload = document.getElementById('qrUpload');
  if (qrBox && qrUpload) {
    qrBox.addEventListener('click', function() {
      qrUpload.click();
    });
    qrUpload.addEventListener('change', handleQRUpload);
  }

  // 解锁按钮
  var unlockBtn = document.getElementById('unlockBtn');
  if (unlockBtn) {
    unlockBtn.addEventListener('click', unlockReport);
  }

  // 隐藏付费墙中可能已经解锁的内容(后续渲染会处理)

  // 动态元素事件代理：QR点击、解锁
  var rs = document.getElementById('resultsSection');
  rs.addEventListener('click', function(e) {
    if (e.target.closest('#qrBox')) {
      var upload = document.getElementById('qrUpload');
      if (upload) upload.click();
    }
    if (e.target.closest('#unlockBtn')) {
      unlockReport();
    }
  });
  rs.addEventListener('change', function(e) {
    if (e.target.id === 'qrUpload') {
      handleQRUpload(e);
    }
  });
});</script>
