<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数字能量分析</title>
<style>
:root{--bg:#0a0a14;--card:#121222;--gold:#c9a040;--gold2:#e8d080;--text:#d8d0c0;--dim:#888478;--border:#222240;--r:12px;--green:#5a9a5a;--red:#c04040}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.8;
background-image:radial-gradient(ellipse at 30% 0%,rgba(201,160,64,0.05) 0%,transparent 50%),radial-gradient(ellipse at 70% 100%,rgba(64,128,176,0.04) 0%,transparent 50%)}
.ct{max-width:520px;margin:0 auto;padding:16px}
.hd{text-align:center;padding:24px 0 14px}
.hd .ic{width:56px;height:56px;margin:0 auto 8px;border-radius:50%;background:linear-gradient(135deg,#2a1a08,#4a3008);display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid var(--gold)}
.hd h1{font-size:19px;color:var(--gold2);font-weight:600;letter-spacing:2px}
.hd p{font-size:11px;color:var(--dim)}
.cd{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.cd h2{font-size:14px;color:var(--gold2);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.cd h2::before{content:'';width:2px;height:14px;background:var(--gold);border-radius:1px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
.fg input,.fg select{width:100%;padding:10px 11px;background:#0c0c1a;border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
.pi{display:flex;gap:6px;align-items:center}
.pi span{color:var(--dim);font-size:12px}
.pi input{flex:1;padding:10px;background:#0c0c1a;border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:19px;text-align:center;letter-spacing:5px;outline:none;max-width:140px;font-family:inherit}
.pi input:focus{border-color:var(--gold)}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#7a5a10,#b08020);color:#1a1a0a;border:none;border-radius:7px;font-size:15px;font-weight:600;letter-spacing:2px;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(.97)}
.err{background:rgba(192,64,64,0.15);border:1px solid rgba(192,64,64,0.3);border-radius:7px;padding:9px 12px;font-size:11px;color:#e06060;margin-bottom:8px;display:none}
.results{display:none}
.rc{background:var(--card);border-radius:var(--r);padding:15px;margin-bottom:8px;border:1px solid var(--border)}
.rc h3{font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:6px;justify-content:space-between}
.s-badge{font-size:11px;font-weight:700;padding:1px 8px;border-radius:9px}
.s-high{background:rgba(90,154,90,0.2);color:#6aae6a}
.s-mid{background:rgba(201,160,64,0.18);color:#d0b060}
.s-low{background:rgba(192,64,64,0.18);color:#e06060}
.fline{font-size:12px;line-height:2;color:var(--text)}
.fline .a{display:block;margin-bottom:3px}
.fline .b{display:block;color:#c0b8a8;font-style:italic}
.overview{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:8px 0}
.ov{background:#0c0c1a;border-radius:7px;padding:9px;text-align:center;border:1px solid var(--border)}
.ov .lbl{font-size:9px;color:var(--dim)}
.ov .val{font-size:22px;font-weight:700;color:var(--gold2);letter-spacing:2px}
.ov .sub{font-size:10px;color:var(--dim)}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0}
.tags span{padding:2px 8px;border-radius:10px;font-size:9px}
.tt{background:rgba(201,160,64,0.12);color:var(--gold2)}
.tw{background:rgba(192,64,64,0.12);color:#e06060}
.tb{background:rgba(64,128,176,0.12);color:#80b8e0}
.pw{background:linear-gradient(135deg,#141408,#1a1808);border:2px dashed var(--gold);border-radius:var(--r);padding:20px 16px;text-align:center;margin:14px 0;position:relative}
.pw::before{content:'🔒';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:24px;background:var(--bg);padding:0 8px}
.pw h3{color:var(--gold2);font-size:15px;margin:6px 0}
.price{font-size:24px;color:var(--gold);font-weight:700;margin:5px 0}
.qr-box{width:140px;height:140px;margin:10px auto;background:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#999;font-size:11px;flex-direction:column;gap:4px;cursor:pointer;overflow:hidden}
.qr-box img{width:100%;height:100%;object-fit:contain}
.ur{display:flex;gap:6px;margin-top:8px}
.ur input{flex:1;padding:8px;background:#0c0c1a;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;text-align:center;outline:none;font-family:inherit}
.ur button{padding:8px 16px;background:var(--gold);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.locked{filter:blur(6px);pointer-events:none;user-select:none;opacity:0.3}
.unlocked{filter:none;pointer-events:auto;user-select:auto;opacity:1}
.dt{font-size:11px;line-height:2.1;color:#c0b8a8;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.dt strong{color:var(--gold2);display:block;margin-top:10px;margin-bottom:3px}
.dt .hl{color:var(--gold)}
.ft{text-align:center;padding:16px;font-size:9px;color:var(--dim)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.rc{animation:up .5s ease forwards}
</style>
</head>
<body>
<div class="ct">
<div class="hd"><div class="ic">☯</div><h1>数字能量分析</h1><p>手机号后四位 · 多维深度解读</p></div>

<div class="cd" id="inputForm"><h2>📱 输入信息</h2>
<div class="fg"><label>手机号后四位</label><div class="pi"><span>*******</span><input type="text" id="phoneDigits" placeholder="0000" maxlength="4" inputmode="numeric"></div></div>
<div class="fg"><label>使用时长</label><select id="duration"><option value="">请选择</option><option value="0.5">半年以内</option><option value="1">1年</option><option value="2">2年</option><option value="3">3-5年</option><option value="5">5-10年</option><option value="10">10年以上</option></select></div>
<div class="fg"><label>性别</label><select id="gender"><option value="">请选择</option><option value="male">男</option><option value="female">女</option></select></div>
<div class="fg"><label>年龄</label><input type="number" id="age" placeholder="请输入年龄" min="10" max="100"></div>
<div class="err" id="errorMsg"></div>
<button class="btn" id="analyzeBtn">⚡ 开始分析</button>
<div id="jsStatus" style="text-align:center;font-size:9px;color:#5a9a5a;margin-top:4px;display:none">✅ 系统就绪</div>
</div>
<div class="results" id="resultsSection"></div>
<div class="ft"><p>基于数字能量结构分析 · 仅供娱乐参考</p></div>
</div>

<script>
// ====== 映射表 ======
var E2N={'1':'金','2':'金','3':'火','4':'木','5':'木','6':'水','7':'土','8':'土','9':'金','0':'土'};
var N2G={'1':'乾','2':'兑','3':'离','4':'震','5':'巽','6':'坎','7':'艮','8':'坤','9':'乾','0':'坤'};
var G2E={乾:'金',兑:'金',离:'火',震:'木',巽:'木',坎:'水',艮:'土',坤:'土'};
var G2B={乾:'头部、骨骼、心血管',兑:'呼吸道、牙齿',离:'心脏、眼睛',震:'肝胆、四肢',巽:'神经系统、骨骼',坎:'肾、血液、膀胱、内分泌',艮:'腰背、坐骨神经',坤:'脾胃、腹部'};
var G2C={乾:'强势、主导、执行力强',兑:'能说会道、人缘好、表达强',离:'外放、热情、反应快',震:'行动快、有魄力、果断',巽:'灵活、善变通、适应力强',坎:'聪明、谋略深、格局大',艮:'稳重、踏实、能守成',坤:'包容、能扛事、耐力强'};
var G2N={乾:'控制欲强、过于自我',兑:'嘴快伤人、口舌是非多',离:'急躁、情绪波动大',震:'脾气急、容易冲动',巽:'摇摆不定、容易改主意',坎:'顾虑多、想太多',艮:'固执、慢热、不灵活',坤:'被动、拖延、容易压抑'};
var SHENG={木:'火',火:'土',土:'金',金:'水',水:'木'};
var KE={金:'木',木:'土',土:'水',水:'火',火:'金'};
function se(a,b){return SHENG[a]===b}
function ke(a,b){return KE[a]===b}
var DZ={0:'亥',1:'子',2:'丑',3:'寅',4:'卯',5:'辰',6:'巳',7:'午',8:'未',9:'申'};
var TAO={子:1,卯:1,午:1,酉:1};
var CK={丑:1,辰:1,未:1,戌:1};
var DAYUN=[[10,20,'乾','金'],[20,30,'兑','金'],[30,40,'离','火'],[40,50,'震','木'],[50,60,'巽','木'],[60,70,'坎','水'],[70,80,'艮','土'],[80,99,'坤','土']];
function dy(age){for(var i=0;i<DAYUN.length;i++)if(age>=DAYUN[i][0]&&age<DAYUN[i][1])return{n:DAYUN[i][2],el:DAYUN[i][3],r:[DAYUN[i][0],DAYUN[i][1]]};return age<10?{n:'乾',el:'金',r:[10,20]}:{n:'坤',el:'土',r:[80,90]}}

// ====== 号码解析 ======
function parse(digits,age,gender,dur){
  var d=digits.split(''),ec={金:0,木:0,水:0,火:0,土:0},gc={};
  for(var i=0;i<4;i++){var el=E2N[d[i]],g=N2G[d[i]];ec[el]=(ec[el]||0)+1;gc[g]=(gc[g]||0)+1}
  var domE='',dc=0;for(var e in ec)if(ec[e]>dc){domE=e;dc=ec[e]}
  var domG=[];for(var g in gc)if(gc[g]>=2)domG.push(g);
  var bal=100;for(var e in ec){if(ec[e]>=3)bal-=25;else if(ec[e]===0)bal-=10}if(dc>=4)bal=20;
  var bz=(d[0]===d[1]&&d[1]===d[2]&&d[2]===d[3]);
  var acc=false;for(var i=0;i<3;i++){var e1=E2N[d[i]],e2=E2N[d[i+1]];if((e1==='火'&&e2==='金')||(e1==='金'&&e2==='木'))acc=true}
  var pal=[{n:'父母宫',dg:d[0],el:E2N[d[0]],g:N2G[d[0]],dz:DZ[d[0]]},{n:'夫妻宫',dg:d[1],el:E2N[d[1]],g:N2G[d[1]],dz:DZ[d[1]]},{n:'自身宫',dg:d[2],el:E2N[d[2]],g:N2G[d[2]],dz:DZ[d[2]]},{n:'子女宫',dg:d[3],el:E2N[d[3]],g:N2G[d[3]],dz:DZ[d[3]]}];
  var self=pal[2],spEl=pal[1].el,selfEl=self.el;
  var spR='';if(ke(spEl,selfEl))spR='ks';else if(ke(selfEl,spEl))spR='sk';else if(se(spEl,selfEl))spR='ss';else if(se(selfEl,spEl))spR='ss2';else spR='bh';
  var ddy=dy(age),dyR='';
  if(se(ddy.el,selfEl))dyR='ss';else if(ke(ddy.el,selfEl))dyR='ks';else if(se(selfEl,ddy.el))dyR='ss2';else if(ke(selfEl,ddy.el))dyR='sk';else dyR='bh';
  var ht=false,hc=false;for(var i=0;i<4;i++){if(TAO[DZ[d[i]]])ht=true;if(CK[DZ[d[i]]])hc=true}
  var sq=false;for(var i=0;i<2;i++)if(Math.abs(parseInt(d[i+1])-parseInt(d[i]))===1)sq=true;
  return{digits:d,ec:ec,gc:gc,domE:domE,domG:domG,bal:bal,bz:bz,acc:acc,pal:pal,self:self,spR:spR,dy:ddy,dyR:dyR,ht:ht,hc:hc,sq:sq,age:age,gender:gender,dur:dur};
}

// ====== 评分 ======
function scoreDim(c,dim){
  var s=50,ec=c.ec,gc=c.gc,self=c.self;
  if(dim==='career'){if(gc['乾']>=2||gc['震']>=2)s+=15;if(gc['坤']>=2||gc['艮']>=2)s-=5;if(c.dyR==='bh'||c.dyR==='ss')s+=12;if(c.dyR==='ks')s-=15;if(c.dyR==='sk')s+=10;if(c.bz)s+=(self.el==='金'||self.el==='火'?8:-5);if(gc['离']>=2)s+=5;if(c.sq)s+=3}
  if(dim==='wealth'){if(c.hc)s+=15;if(c.dyR==='sk')s+=15;if(c.dyR==='ks')s-=10;if(gc['乾']>=2)s+=5;if(ec['水']>=3)s-=5;if(c.sq)s+=5}
  if(dim==='love'){if(gc['兑']>=2||gc['离']>=2)s+=15;if(gc['巽']>=1)s+=5;if(c.ht)s+=10;if(c.spR==='ks')s-=12;if(c.spR==='ss')s+=10;if(c.spR==='ss2')s-=5;if(gc['坎']>=2)s-=5;if(ec['火']>=3)s-=5}
  if(dim==='marriage'){if(gc['坤']>=1||gc['艮']>=1)s+=12;if(ec['土']>=1&&ec['土']<=2)s+=8;if(c.spR==='bh')s+=10;if(c.spR==='ks')s-=10;if(gc['兑']>=3||gc['离']>=3)s-=10;if(gc['乾']>=3||gc['震']>=3)s-=5;if(c.bz&&self.el==='火')s-=8}
  if(dim==='health'){s=70;for(var e in ec)if(ec[e]>=3)s-=20;if(c.acc)s-=20;if(c.bal>=70)s+=10;if(ec['水']>=3)s-=8;if(ec['火']>=3)s-=8;if(c.dyR==='ks'||c.dyR==='ss2')s-=5}
  if(dim==='personality'){s=60;if(c.bal>=70)s+=10;if(c.bz)s-=15;if(ec[self.el]>=3)s-=10;if(gc['乾']>=2)s+=5;if(gc['兑']>=2)s+=3}
  if(dim==='family'){if(ec['土']>=1&&ec['土']<=2)s+=10;if(gc['坤']>=1)s+=8;if(c.spR==='bh')s+=8;if(c.spR==='ks')s-=10;if(c.dyR==='ks')s-=5;if(ec['火']>=3)s-=5}
  s=Math.max(5,Math.min(98,s));
  return{score:s,level:s>=70?'excellent':s>=55?'good':s>=40?'neutral':s>=25?'caution':'warning'};
}

// ====== 模板库（每句注入号码专属特征） ======
function tpl(dim,comp,sc){
  var el=comp.domE,cnt=comp.ec[el],tg=(comp.domG[0]||comp.self.g),tg2=comp.domG[1]||'';
  var ch=G2C[tg],cn=G2N[tg],lv=sc.level;
  var seed=parseInt(comp.digits.join(''),10);
  var elH=cnt>=3?el+'极旺('+cnt+'/4位)':el+'为主('+cnt+'/4位)';
  var gH=tg+'卦主导'+(tg2?'、'+tg2+'卦为辅':'');
  var spW=comp.spR==='ks'?'夫妻宫受克':comp.spR==='sk'?'你主导关系':comp.spR==='ss'?'夫妻宫生你':comp.spR==='ss2'?'你生夫妻宫':'夫妻宫比合';
  var dyW=comp.dyR==='sk'?'大运利你':comp.dyR==='ks'?'大运压你':comp.dyR==='ss'?'大运助你':comp.dyR==='ss2'?'你生大运':'大运平稳';

  var pool={
    career:{
      excellent:{a:[
        elH+'，'+gH+'，'+dyW+'——执行力在线，平台运走强。',
        '号码中'+elH+'配上'+gH+'——事业进入快车道，不缺往上走的机会。',
        el+'果断+'+tg+'格局，'+dyW+'——当前适合主动出击、争取资源。',
        gH+'带来资源整合力，'+elH+'让你做事不拖泥带水——越主动越出结果。'
      ],b:[
        elH+'的结构下，事业像顺风骑车——方向对了用力了，速度比平时快。'+dyW+'是关键推力。',
        '这组号码在事业上更像把机会推到你面前——'+gH+'让你在职场中容易被注意到，'+elH+'帮你在关键时刻抓得住。',
        '不是等待型的事业运——'+elH+'意味着你必须动，但动起来的回报比你预期的快。'+gH+'加持下资源和人脉都往你这边靠。'
      ]},
      good:{a:[
        elH+'，'+gH+'——方向对，节奏把控好。'+dyW+'。',
        '号码中'+elH+'，'+gH+'——适合深耕现有岗位，厚积薄发。',
        '事业稳中向好——'+el+'属性让你有章法，'+tg+'卦稳住底盘。',
        gH+'的事业底盘稳——'+elH+'适合积累型发展路线。'
      ],b:[
        '不是立刻见顶的类型——'+elH+'意味着先铺路、后收成，越往后越容易出结果。'+gH+'帮你守住已经拿到的。',
        '适合走稳步抬升路线，不宜频繁换方向。'+elH+'让你做事有后劲，'+gH+'让你稳得住——深耕比跳槽划算。'
      ]},
      neutral:{a:[
        elH+'，'+gH+'——事业过渡期，先观望别有大动作。',
        '号码能量偏分散——'+elH+'，'+dyW+'。先稳后求变。',
        gH+'偏守成，'+elH+'——当前不打就是赢。'
      ],b:[
        '当前阶段不是爆发期，更像储备期——'+elH+'把基础打牢，下一个阶段发力时才不会踩空。'+gH+'提示：守住饭碗最重要。'
      ]},
      caution:{a:[
        elH+'，'+gH+'——事业容易硬碰硬，'+dyW+'。不是你能力不够，是场不合。',
        '号码克耗信号明显——'+elH+'，推进有阻力。运势叫你慢一点。',
        gH+'在当前大运下承压——'+elH+'，先守后攻，别冲动换赛道。'
      ],b:[
        '当前阶段像被上了紧箍咒——'+elH+'想冲但规则卡着你。'+gH+'提示：不是你没能力，是外部条件不配合。'+(comp.dyR==='ks'?'熬过这段反而更锋利。':'先稳住基本盘。')
      ]},
      warning:{a:[
        elH+'，'+gH+'——冲突感重，干得累不见效。先稳住。',
        '号码对事业形成压制——'+elH+'，'+dyW+'。收缩战线比出击安全。'
      ],b:[
        '这阶段最怕的不是没机会，而是乱动。'+elH+'加上'+gH+'受克——建议保持现状，缩减不必要动作。'
      ]}
    },
    wealth:{
      excellent:{a:[
        elH+'，财星在线——赚钱嗅觉灵敏，不是死工资命。'+(comp.hc?'带财库，蓄财力强。':''),
        gH+'利求财——'+elH+'带来资源整合型收入，'+(comp.hc?'且能存住钱。':'注意管住手。'),
        '号码中'+elH+(comp.hc?'，财库在线——':'——')+gH+'下赚钱渠道比一般人多。'
      ],b:[
        elH+'的财运逻辑是"你能赚"——关键是你敢不敢出手。'+gH+'帮你发现机会，'+(comp.hc?'财库帮你守住成果。':'但守财是更重要的功课。')
      ]},
      good:{a:[
        elH+'，'+gH+'——财运OK，细水长流稳得住。',
        '号码中'+elH+'，不是暴富命——积少成多型。',
        '财运稳中向好——'+el+'属性带来赚钱嗅觉，'+tg+'卦守住底线。'
      ],b:[
        '不是暴富型财运——'+elH+'但细水长流。'+gH+'提示：积少成多比一夜暴富更适合你。'
      ]},
      neutral:{a:[
        elH+'，'+gH+'——财运平稳，大额支出先缓缓。',
        '当前进账不快——'+gH+'提示：守住本金比追求收益重要。'
      ],b:[

  html+='<div class="rc"><h3>📊 号码总览</h3>';
  html+='<div class="overview">';
  for(var i=0;i<4;i++)html+='<div class="ov"><div class="lbl">'+c.pal[i].n+'</div><div class="val">'+c.pal[i].dg+'</div><div class="sub">'+c.pal[i].el+' · '+c.pal[i].g+'卦</div></div>';
  html+='</div><div class="tags">';
  html+='<span class="tt">主导：'+c.domE+'</span>';
  html+='<span class="tt">大运：'+c.dy.n+'卦('+c.dy.r[0]+'-'+c.dy.r[1]+'岁)</span>';
  if(c.bz)html+='<span class="tw">豹子号</span>';
  if(c.acc)html+='<span class="tw">冲撞组合</span>';
  if(c.ht)html+='<span class="tb">桃花入局</span>';
  if(c.hc)html+='<span class="tt">财库在线</span>';
  html+='</div>';
  var totalScore=0;for(var i=0;i<dims.length;i++)totalScore+=r[dims[i]].score;
  var avg=Math.round(totalScore/dims.length);
  html+='<div style="font-size:10px;color:var(--dim)">综合：<b style="color:var(--gold2)">'+avg+'分</b> · '+(avg>=60?'整体偏吉':avg>=40?'整体平稳':'整体偏凶')+' · '+c.domE+'占主导('+c.ec[c.domE]+'/4位)</div></div>';

  // 免费维度
  for(var i=0;i<dims.length;i++){
    var d=dims[i],item=r[d];
    html+='<div class="rc"><h3><span>'+dimE[d]+' '+dimL[d]+'</span><span class="s-badge '+(item.level==='excellent'||item.level==='good'?'s-high':item.level==='neutral'?'s-mid':'s-low')+'">'+item.score+'分 '+lvN[item.level]+'</span></h3>';
    html+='<div class="fline"><span class="a">'+item.style_a+'</span><span class="b">'+item.style_b+'</span></div></div>';
  }

  // 总结
  html+='<div class="rc" style="border-left:3px solid var(--gold)"><h3>📋 综合总结</h3><div class="fline">';
  html+='<span class="a">整体：<b>'+(avg>=60?'偏吉':avg>=40?'平':'偏凶')+'</b>（'+avg+'分）。'+c.domE+'占主导('+c.ec[c.domE]+'/4位)，'+(c.domG.length>0?c.domG.join('、')+'卦主导。':'卦象分散。')+'</span>';
  var warns=[];
  if(c.acc)warns.push('号码含冲撞组合，注意出行安全');
  if(c.bz)warns.push('豹子号磁场极强，个性容易走极端');
  if(c.dyR==='ks')warns.push('当前大运压你，各方面宜稳守');
  if(!c.hc)warns.push('财库不显，注意理财规划');
  if(warns.length)html+='<span class="b">⚠ '+warns.join('；')+'。</span>';
  html+='</div></div>';

  // 付费墙
  html+='<div class="pw" id="paywall"><h3>🔓 解锁深度报告</h3>';
  html+='<p style="font-size:10px;color:var(--dim);line-height:1.7">解锁后查看每个维度的完整解读：详细评分依据、个性化趋势分析、针对性行动建议</p>';
  html+='<div class="price">¥9.9 <small>/ 次</small></div>';
  html+='<div class="qr-box" id="qrBox"><span id="qrText">点击上传<br>微信收款码</span><img id="qrImg" style="display:none"></div>';
  html+='<input type="file" id="qrUpload" accept="image/*" style="display:none">';
  html+='<p style="font-size:9px;color:var(--dim)">支付后截图获取解锁码</p>';
  html+='<div class="ur"><input type="text" id="unlockCode" placeholder="输入解锁码" maxlength="20"><button id="unlockBtn">解锁</button></div>';
  html+='<p style="font-size:8px;color:var(--dim);margin-top:4px">演示码：<b>8888</b></p></div>';

  // 详细报告
  html+='<div id="detailSection" class="'+(isUnlocked?'unlocked':'locked')+'">';
  for(var i=0;i<dims.length;i++){
    var d=dims[i],item=r[d];
    html+='<div class="rc"><h3>'+dimE[d]+' '+dimL[d]+' <span style="font-size:10px;color:var(--gold)">【深度】</span><span class="s-badge '+(item.level==='excellent'||item.level==='good'?'s-high':item.level==='neutral'?'s-mid':'s-low')+'">'+item.score+'分</span></h3>';
    html+='<div class="dt">'+paidDetail(d,c,item)+'</div></div>';
  }
  html+='<div class="rc" style="border-left:3px solid var(--gold)"><h3>📋 深度总结</h3><div class="dt"><strong>号码画像</strong>'+c.domE+'占主导('+c.ec[c.domE]+'/4位)，'+(c.domG.length>0?c.domG.join('、')+'卦主导。':'卦象分散。')+'当前'+c.dy.n+'卦大运。';
  if(warns.length)html+='<strong>⚠ 重点关注</strong>'+warns.join('；')+'。';
  html+='<strong>一句话</strong>'+(avg>=60?'当前适合主动出击——号码给了助力，别浪费。':'当前适合稳扎稳打——了解它、善用它，但不能依赖它。')+'</div></div></div>';

  document.getElementById('resultsSection').innerHTML=html;
  if(isUnlocked){var pw=document.getElementById('paywall');if(pw)pw.style.display='none'}
}

// ====== 事件 ======
var isUnlocked=false,currentData=null;
function showError(m){document.getElementById('errorMsg').textContent=m;document.getElementById('errorMsg').style.display='block'}

function startAnalysis(){
  try{
    var ds=document.getElementById('phoneDigits').value.trim();
    var dur=document.getElementById('duration').value,gd=document.getElementById('gender').value;
    var ag=parseInt(document.getElementById('age').value);
    if(!/^\d{4}$/.test(ds)){showError('请输入4位数字');return}
    if(!dur){showError('请选择使用时长');return}
    if(!gd){showError('请选择性别');return}
    if(!ag||isNaN(ag)||ag<10||ag>100){showError('请输入有效年龄');return}
    try{isUnlocked=localStorage.getItem('np_v3')==='true'}catch(e){isUnlocked=false}
    var comp=parse(ds,ag,gd,parseFloat(dur));
    var dims=['personality','career','wealth','love','marriage','health','family'];
    var report={};
    for(var i=0;i<dims.length;i++){var d=dims[i],sc=scoreDim(comp,d);var t=tpl(d,comp,sc);report[d]={score:sc.score,level:sc.level,style_a:t.a,style_b:t.b}}
    currentData={comp:comp,report:report};
    render(currentData);
    document.getElementById('resultsSection').style.display='block';
    document.getElementById('resultsSection').scrollIntoView({behavior:'smooth'});
  }catch(e){showError('出错: '+e.message);console.error(e)}
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('jsStatus').style.display='block';
  try{isUnlocked=localStorage.getItem('np_v3')==='true'}catch(e){}
  document.getElementById('analyzeBtn').addEventListener('click',startAnalysis);
  document.getElementById('phoneDigits').addEventListener('input',function(){this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)});
  var rs=document.getElementById('resultsSection');
  rs.addEventListener('click',function(e){
    if(e.target.closest('#qrBox')){var u=document.getElementById('qrUpload');if(u)u.click()}
    if(e.target.closest('#unlockBtn'))unlock();
  });
  rs.addEventListener('change',function(e){if(e.target.id==='qrUpload')handleQR(e)});
});
function handleQR(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var i=document.getElementById('qrImg');i.src=ev.target.result;i.style.display='block';document.getElementById('qrText').style.display='none'};r.readAsDataURL(f)}
function unlock(){var c=document.getElementById('unlockCode').value.trim();if(['8888','2026','6688'].indexOf(c)>=0){isUnlocked=true;try{localStorage.setItem('np_v3','true')}catch(e){}var pw=document.getElementById('paywall');if(pw)pw.style.display='none';var ds=document.getElementById('detailSection');if(ds){ds.classList.remove('locked');ds.classList.add('unlocked')}}else{alert('解锁码错误。演示码：8888')}}
window.onerror=function(m,url,line){var el=document.getElementById('errorMsg');el.innerHTML='⚠ '+m;el.style.display='block';return false};
</script>
</body>
</html>
